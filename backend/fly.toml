# Fly.io deployment config — one app, three processes from one image.
#
# First-time setup (from repo root):
#   flyctl launch --no-deploy --copy-config --name biograph-api --region <iad|sjc|…>
#   # (accepts this file as the launched config)
#
# Subsequent deploys:
#   flyctl deploy --config backend/fly.toml
#
# Set secrets before the first deploy. Do not commit production secrets.

app = "biograph-api"
primary_region = "iad"          # change to your region before first deploy

[build]
  dockerfile = "backend/Dockerfile"

# Three process groups off the same image. The entity API serves HTTP;
# the Celery worker executes ingestion tasks; Beat emits the daily schedule.
[processes]
  web    = "uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers"
  worker = "celery -A app.celery_app worker --loglevel=info --concurrency=2"
  beat   = "celery -A app.celery_app beat --loglevel=info"

# Only the web process takes public traffic.
[[services]]
  processes = ["web"]
  protocol = "tcp"
  internal_port = 8000
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

  [[services.http_checks]]
    interval = "15s"
    timeout = "3s"
    grace_period = "10s"
    method = "get"
    path = "/health"
    protocol = "http"

# Sizing — start tiny, bump when we see queue depth / CPU pressure.
[[vm]]
  processes = ["web"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[vm]]
  processes = ["worker"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024     # ingestion hits CT.gov + builds large response docs

[[vm]]
  processes = ["beat"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
