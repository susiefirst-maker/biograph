  - name: "Casgevy real-world (Q4 2024)"
    drug: exa-cel
    sponsor: Vertex / CRISPR
    phase: phase_4
    status: ongoing
    significance: "Q4 2024 global Casgevy infusion count <20 patients despite ~20,000 US eligible SCD patients; validates manufacturing-personalization ceiling; commercial ramp shape-of-curve indicator"

scientific_bottlenecks:
  - "Delivery — AAV capsid immunogenicity (~30-50% pre-existing antibodies to common capsids excluding patients from retreatment); LNP hepatic-restricted for in-vivo CRISPR; extrahepatic in-vivo delivery mostly unsolved"
  - "Manufacturing + scale — Casgevy 7-12 week vein-to-vein, myeloablative conditioning burden, ~60 certified centers globally → infusion ceiling <1,000/year initially for SCD"
  - "Pricing model — $2-3.5M per infusion creates payer-bankruptcy risk under annual-budget reimbursement; outcomes-based installments + government reinsurance pools still developing"
  - "Off-target editing — CRISPR-Cas9 double-strand breaks can cause unintended rearrangements; base / prime editing address by avoiding DSBs but introduce new biology questions"
  - "AAV durability decline — Hemgenix / Zolgensma FVIII + SMN1 expression decreases over years in subset of patients; redosing blocked by anti-AAV antibodies"
  - "Safety signals — Zolgensma hepatotoxicity deaths 2022+, high-dose DMD gene therapy program pauses, VERVE-101 thrombocytopenia — class requires conservative dose-escalation + broad AE surveillance"

market_dynamics: |
  Global gene / gene-editing therapy market reached ~$3 billion
  2023 with projected $20-30B by 2030 per analyst consensus.
  Leading revenues: Zolgensma ~$1.3B 2023 (declining slightly as
  SMN1 birth cohort stabilizes), Luxturna ~$150M, Elevidys ~$700M
  2023 despite EMBARK primary miss. Casgevy + Lyfgenia 2024
  revenues nominal (~$10M combined) — limited by manufacturing +
  certification bottleneck despite unlimited demand. Pricing
  precedent: $2.25M Zolgensma 2019 → $2.2M Casgevy + $3.1M
  Lyfgenia 2023 → $3.5M Hemgenix 2022 → $4.25M Lenmeldy
  (atidarsagene) 2024. Outcomes-based installment contracts
  (Novartis, Vertex) + SCD CMS reinsurance pool 2023 are the
  emerging commercial structure. Vertex paid ~$900M up-front to
  CRISPR Therapeutics + 60/40 split on Casgevy economics.
  Intellia + Editas + Beam + Prime Medicine combined market cap
  ~$6B 2024 vs ~$50B peak 2021 — pre-revenue platform biotechs
  severely revalued. In-vivo CRISPR (NTLA-2001) and base editing
  (VERVE-102) are the 2025-2027 inflection points.

regulatory_context: |
  FDA CBER regulates gene therapy as biologics with combined
  cell + gene considerations; each autologous product requires
  REMS + certified-center framework similar to CAR-T. Casgevy
  December 2023 approval was the first-ever CRISPR approval —
  standard Phase 3 efficacy + 15-year post-marketing follow-up.
  Elevidys 2024 FDA expansion despite EMBARK Phase 3 miss set
  controversial precedent — FDA accepted functional / biomarker
  evidence over hard PFS endpoint; drew accelerated-approval
  oversight concerns. FDA 2022 guidance on human somatic cell
  therapy + gene therapy provides the regulatory framework.
  EMA + NICE (UK) have been more conservative on pricing —
  Luxturna + Zolgensma access more restricted in EU. China NMPA
  has limited domestic gene-therapy pipeline; regulatory
  framework lagged. IRA 2022 Medicare price-negotiation carve-
  out for gene therapies <10 years post-approval is currently
  protective but expires 2030.

hot_targets:
  - gene_symbol: BCL11A
    name: "BCL11A"
    rationale: "Transcriptional repressor of fetal hemoglobin; Casgevy + EDIT-301 both target — reactivating HbF to compensate for mutant HbS / β-globin"
  - gene_symbol: HBB
    name: "β-globin (HBB)"
    rationale: "Direct target of next-gen programs for sickle cell + β-thalassemia; alternative to BCL11A indirect approach"
  - gene_symbol: TTR
    name: "Transthyretin (TTR)"
    rationale: "Intellia NTLA-2001 Phase 3 — first in-vivo CRISPR target; canonical hepatic-LNP validation"
  - gene_symbol: LDLR
    name: "LDL Receptor (LDLR)"
    rationale: "Verve VERVE-102 post-PCSK9 pivot; direct upregulation of LDL clearance"
  - gene_symbol: SMN1
    name: "Survival Motor Neuron 1 (SMN1)"
    rationale: "Zolgensma target — replacement gene delivered via AAV9; $2.25M precedent for SMA"
  - gene_symbol: DMD
    name: "Dystrophin (DMD)"
    rationale: "Elevidys partial-dystrophin AAV replacement; Sarepta exon-skipping legacy; complex gene requires mini-dystrophin strategies"
  - gene_symbol: F9
    name: "Factor IX (F9)"
    rationale: "Hemgenix + Beqvez target — hemophilia B; AAV delivery to hepatocytes"
  - gene_symbol: F8
    name: "Factor VIII (F8)"
    rationale: "Roctavian target — hemophilia A; larger gene requiring specialized AAV5 capsid engineering"

