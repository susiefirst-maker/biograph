scientific_bottlenecks:
  - "Cytokine release syndrome (CRS) for CD3-based T-cell engagers — 30-70% any grade; step-up dosing + tocilizumab rescue mandatory for outpatient use"
  - "ICANS-like neurotoxicity — 10-25% any-grade; subcutaneous administration reduces incidence vs IV"
  - "Manufacturing complexity — each bispecific format (DuoBody, CrossMab, XmAb, HexaBody, KiH) has distinct process and QC requirements; COGS 2-3x naked antibody"
  - "Solid-tumor T-cell-engager hostility — most CD3 bispecifics work in heme cancers; solid-tumor success limited to tarlatamab (SCLC high DLL3 expression) and tebentafusp (uveal melanoma HLA restriction)"
  - "Subcutaneous conversion — IV-to-SC reformulation requires Phase 3 bridging; epcoritamab and mosunetuzumab SC launches are differentiating but resource-intensive"
  - "Head-to-head data rare — most bispecifics approved single-arm; cross-trial inference unreliable; HARMONi-2 2024 is the notable exception"

market_dynamics: |
  Global bispecific-antibody sales reached ~$5 billion in 2023 and
  are projected to $25-40 billion by 2030 per analyst consensus —
  fastest-growing oncology subclass. Category leaders: emicizumab
  (Hemlibra) $4.1B 2023 (hemophilia A, outside oncology), teclistamab
  (Tecvayli) $700M 2023 rapid ramp, amivantamab (Rybrevant) $560M
  2023. Ivonescimab's HARMONi-2 September 2024 head-to-head win
  vs pembrolizumab triggered a 10x market-cap revaluation of
  Summit Therapeutics and opened the PD-1 × VEGF race industry-
  wide. BMS + J&J + Regeneron all have PD-1 × VEGF programs in
  Phase 2. Chinese bispecific pipeline (Akeso, Innovent, Harbour
  BioMed, LaNova) continues explosive out-licensing: LaNova-Merck
  $590M 2024 for PD-1 × VEGF-A; Akeso global expansion via Summit.

regulatory_context: |
  FDA has been receptive to accelerated approval for bispecifics
  with defined single-arm data (mosunetuzumab, glofitamab,
  epcoritamab, teclistamab, elranatamab, linvoseltamab, talquetamab,
  tarlatamab, tebentafusp). Class labeling for CD3-based T-cell
  engagers mandates REMS-like monitoring for CRS + ICANS. 2024
  class-wide subcutaneous administration conversion trend (epco SC,
  mosun SC) is reducing infusion-center burden. HARMONi-2 single-
  arm/H2H data from China supporting US approval still pending;
  Summit Therapeutics' multi-region Phase 3 addresses post-
  sintilimab (PD-1, 2022) single-region data concerns. Non-
  oncology pathway (emicizumab, faricimab) uses conventional
  full approval with active comparator.

