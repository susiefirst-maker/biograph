lessons:
  - title: "Companion-Diagnostic Redefinition as a Market-Expansion Moat"
    title_zh: "通过伴随诊断重新定义来扩大市场的护城河"
    lesson_type: strategic_commercial
    pattern: |
      When a therapy's efficacy extends beyond the historical
      biomarker cutoff used to define its eligible population,
      working with regulators to formally redefine the diagnostic
      category can double or triple the addressable market without
      requiring a new molecule. Enhertu's 2022 HER2-low expansion
      (IHC 1+ or 2+/ISH-) didn't just add patients — it
      operationally created a new category that every HER2
      diagnostic had to support, entrenching Enhertu's incumbent
      position. Sponsors who invest in the diagnostic redefinition
      capture category-definition benefit beyond molecule-level
      differentiation.
    key_evidence:
      - "HER2+ breast cancer prevalence ~15-20%; HER2-low adds ~40-50% → total addressable roughly doubles"
      - "T-DXd HER2-low sales segment from 2022 approval → $1B+ by 2024"
      - "FDA HER2 scoring guidance updated 2023 to formalize HER2-low; all IHC vendors had to re-validate"
      - "Kadcyla (HER2+ only) did not follow — failed DESTINY-Breast03 head-to-head, left the expansion to Enhertu"
    limitations:
      - "Requires a therapy with real activity below the historical threshold — this is mechanism-dependent"
      - "Diagnostic redefinition is a 3-5 year regulatory effort; small sponsors can't lead this alone"
      - "Concentrates revenue on one molecule; follow-on entrants face a recategorized bar, not an incremental one"
    applicable_contexts:
      - "ADC programs targeting well-known biomarkers (HER2, TROP2, FRα)"
      - "Any therapeutic area with graded biomarker expression and historical binary cutoffs"
      - "Commercial strategy discussions for potential label expansions"
    applicable_to_landscapes:
      - adc
      - her2
      - oncology-biomarkers
    human_reviewed: true
    reviewed_by: di

  - title: "Payload-Generation Compounding Rewards Platform Depth Over Single-Asset Focus"
    title_zh: "载荷代际的复利优势回报于平台深度而非单一资产"
    lesson_type: scientific_mechanistic
    pattern: |
      ADC commercial leaders own the payload platform, not the
      single molecule. The DM1 → MMAE → exatecan/deruxtecan
      progression shows each payload generation widens the
      therapeutic window by 2-3x and addresses previous-generation
      limitations (bystander effect, stability, toxicity).
      Daiichi's exatecan-derived deruxtecan platform now supports
      Enhertu, Datroway, patritumab deruxtecan, ifinatamab
      deruxtecan, raludotatug deruxtecan — five ADCs from one
      chemistry. Sponsors with a single-asset strategy can win a
      molecule but lose the franchise.
    key_evidence:
      - "Daiichi deruxtecan platform: 7 ADCs in Phase 2/3 as of 2025"
      - "AstraZeneca paid $6.9B + $6B milestones to Daiichi for exclusive ex-Japan rights — priced the platform, not molecules"
      - "Pfizer-Seagen $43B = platform price for linker/payload + target-discovery + 4 approved assets"
      - "ImmunoGen (maytansinoid platform) → AbbVie $10B 2023; single-payload franchise valued at ~25% of Seagen's multi-payload one"
    limitations:
      - "Payload platform investment is $500M-$2B cumulative R&D over 10+ years — only realistic for top-20 pharmas or platform-focused biotechs"
      - "Next-generation payloads (STING agonists, dual-payload, immune-modulator) still early — any platform may become obsolete"
      - "China-originator platforms are iterating faster than some Western sponsors — competitive advantage time-limited"
    applicable_contexts:
      - "ADC sponsor strategy — platform vs single-asset"
      - "Pharma M&A valuation of ADC targets (Seagen, ImmunoGen, DualityBio-style platforms)"
      - "China ADC outbound-licensing terms structuring"
    applicable_to_landscapes:
      - adc
      - peptide-therapeutics
    human_reviewed: true
    reviewed_by: di

  - title: "Chinese Out-Licensing as the Dominant ADC Deal Structure Post-2023"
    title_zh: "中国对外授权作为2023年后ADC领域主导的交易结构"
    lesson_type: market_access_pricing
    pattern: |
      Chinese biotechs have shifted from direct commercialization
      ambitions to upfront-plus-milestone out-licensing as the
      economically rational way to monetize early-stage ADC assets.
      The DualityBio-BioNTech 2023 and DualityBio-GSK 2024 deals
      (both $1.5B total) set the template: $150-300M upfront,
      $1-1.3B milestones, split ex-China rights. Western buyers
      get de-risked Phase 2 assets at fraction of internal R&D
      cost; Chinese biotechs get non-dilutive capital without the
      regulatory + commercial cost of ex-China launch. The model
      works because Chinese Phase 1-2 execution is fast and costs
      are 40-60% below Western benchmarks.
