mesh_id: D061067    # Immunoconjugates

disease_overview: |
  Antibody-drug conjugates (ADCs) couple tumor-targeting monoclonal
  antibodies with cytotoxic small-molecule payloads via a chemical
  linker, delivering highly potent chemotherapy to antigen-expressing
  cells while sparing normal tissue. The architecture was proposed
  by Paul Ehrlich as the "magic bullet" concept in the early 1900s;
  the first clinical-grade ADC (gemtuzumab ozogamicin, Mylotarg)
  reached FDA in 2000, was withdrawn in 2010 over safety + efficacy
  concerns, and was re-approved in 2017 with a reworked dose. The
  modality's current explosive momentum dates to 2019 — the
  approvals of trastuzumab deruxtecan (Enhertu, Daiichi Sankyo /
  AstraZeneca), enfortumab vedotin (Padcev, Astellas / Seagen /
  Pfizer), and polatuzumab vedotin (Polivy, Roche) all within six
  months.

  By 2025 there are 14+ FDA-approved ADCs across hematologic and
  solid-tumor indications. The defining 2022 readout was DESTINY-
  Breast04: T-DXd cut risk of progression by 50% vs physician's
  choice chemotherapy in HER2-low breast cancer — creating an
  entirely new diagnostic category (IHC 1+ or 2+/ISH-) and
  roughly doubling the addressable population of HER2-directed
  therapy. T-DXd followed in 2023 with DESTINY-Breast06 extending
  to HER2-ultralow and in 2024 with DESTINY-Lung04 in NSCLC.

  Pfizer's 2023 $43 billion acquisition of Seagen consolidated
  four approved ADCs (Adcetris, Padcev, Tivdak, Tukysa-partnered)
  and the industry's deepest linker/payload platform — the largest
  ADC-driven M&A deal to date. The Chinese ADC pipeline has
  exploded in parallel, with DualityBio, Innovent, Junshi, and
  RemeGen driving a wave of large out-licensing deals (DualityBio
  / BioNTech $1.5B 2023; DualityBio / GSK $1.5B 2024). Linker-
  payload chemistry is iterating fast — DM1/DM4 maytansinoids and
  MMAE/MMAF auristatins dominated 2011-2019; topoisomerase I
  inhibitor payloads (deruxtecan / exatecan / SN-38) dominate
  2019-present.

disease_overview_zh: |
  抗体偶联药物(ADC)通过化学连接体将肿瘤靶向单克隆抗体与高效
  细胞毒小分子载荷偶联,向表达特定抗原的细胞精准递送化疗药物,
  同时减少正常组织毒性。该架构最早由Paul Ehrlich在20世纪初提
  出"魔法子弹"概念;首个临床级ADC(gemtuzumab ozogamicin,
  Mylotarg)于2000年获FDA批准,2010年因安全性和有效性问题撤
  市,2017年以修订剂量重新获批。该模态当前的爆发式增长始于
  2019年 — 曲妥珠单抗德鲁替康(Enhertu,第一三共/阿斯利康)、
  恩沛妥珠单抗维多汀(Padcev,Astellas/Seagen/辉瑞)、博纳吐
  单抗维多汀(Polivy,罗氏)均在六个月内相继获批。

  截至2025年,FDA已批准14种以上ADC,涵盖血液肿瘤和实体瘤适
  应症。2022年DESTINY-Breast04是里程碑数据:T-DXd在HER2低表
  达乳腺癌中较医生选择的化疗将进展风险降低50%,由此开辟全新
  诊断类别(IHC 1+或2+/ISH-),HER2靶向治疗的潜在适用人群扩
  大约一倍。T-DXd在2023年DESTINY-Breast06中进一步延伸至
  HER2超低表达,2024年DESTINY-Lung04拓展至非小细胞肺癌。

  辉瑞2023年以430亿美元收购Seagen,整合了四个已获批ADC
  (Adcetris、Padcev、Tivdak、合作Tukysa)以及业内最深厚的
  连接体-载荷平台 — 这是迄今为止最大的ADC驱动型并购交易。
  与此同时,中国ADC管线同步爆发,DualityBio、信达、君实、
  荣昌等驱动了一波大额对外授权交易(DualityBio/BioNTech
  2023年15亿美元、DualityBio/GSK 2024年15亿美元)。连接体-
  载荷化学快速迭代 — DM1/DM4美登素类和MMAE/MMAF奥瑞他汀类
  在2011-2019年占主导,拓扑异构酶I抑制剂载荷(deruxtecan /
  exatecan / SN-38)在2019年至今占主导。

