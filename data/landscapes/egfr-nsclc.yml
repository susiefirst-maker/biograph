lessons:
  - title: "Resistance-Driven Generational Development as a Predictable Cadence"
    title_zh: "耐药驱动的迭代式开发作为可预测的节奏"
    lesson_type: scientific_mechanistic
    pattern: |
      In kinase-driven cancers, each TKI generation selects for a
      predictable resistance mutation (T790M post-1st/2nd gen,
      C797S post-3rd gen) that the next generation is engineered
      to address. The generational cadence is ~5-7 years and the
      commercial winner of each generation is typically not the
      first-to-market but the one with the broadest CNS + safety
      profile. Sponsors that invest in the resistance-mutation
      screen early and have chemistry platform depth (AstraZeneca's
      osimertinib, Blueprint's BLU-945) capture generation N+1;
      sponsors betting on single-generation dominance lose share
      at every cycle.
    key_evidence:
      - "1st-gen (gefitinib 2003) → T790M resistance in 50-60% → 3rd-gen (osimertinib 2015) → C797S resistance in ~20% → 4th-gen in clinic 2024-2025"
      - "Cadence: ~8 years between gefitinib 2003 approval and T790M structural understanding (2011-2012); ~3 years between osimertinib approval and first C797S-selective programs in development"
      - "Tagrisso (osimertinib) captured 75%+ share of the 3rd-gen wave — had better CNS and 1L FLAURA head-to-head; Chinese 3rd-gen molecules took domestic but not global share"
      - "4th-gen race includes BLU-945, WJ13404, multiple Chinese programs; Phase 3 likely 2026-2027"
    limitations:
      - "Applies to kinase-driven cancers with defined gatekeeper residues; does not apply to tumor-suppressor or non-kinase targets"
      - "Requires structural biology + medicinal chemistry platform investment measured in decades, not quarters"
      - "Patent-life tradeoff — 4th-gen development starts before 3rd-gen even launches; cannibalizes own market if timed wrong"
    applicable_contexts:
      - "EGFR / ALK / ROS1 / RET / NTRK NSCLC TKI strategy"
      - "KRAS G12C resistance (adagrasib post-sotorasib)"
      - "FLT3, BTK, other kinase inhibitor classes with resistance signatures"
    applicable_to_landscapes:
      - egfr-nsclc
      - her2
      - kinase-oncology
    human_reviewed: true
    reviewed_by: di

  - title: "CNS-Penetrant Profile Wins Generation Races in Brain-Mets-Prone Cancers"
    title_zh: "在脑转移高发癌症中透脑性决定一代药物竞赛胜负"
    lesson_type: clinical_development
    pattern: |
      EGFR+ NSCLC has ~30% baseline and ~60%+ lifetime CNS
      metastasis rates. First-generation TKIs (gefitinib, erlotinib)
      cross the blood-brain barrier poorly; osimertinib was
      designed with explicit CNS penetration and won FLAURA 1L on
      an overall survival + CNS-benefit story, not on peripheral
      PFS alone. The MARIPOSA combination (amivantamab + lazertinib)
      similarly emphasized CNS-PFS to differentiate vs osimertinib.
      Sponsors whose candidate molecules can't cross BBB get
      structurally disadvantaged in CNS-heavy cancers regardless
      of systemic activity. Same rule that applied in HER2 (tucatinib
      HER2CLIMB) applies here.
    key_evidence:
      - "FLAURA 1L: osimertinib vs 1st-gen HR 0.46 PFS with pronounced CNS-PFS benefit"
      - "Gefitinib + erlotinib CNS concentration ~5-10% of serum; osimertinib >100% with active transporter affinity"
      - "MARIPOSA 2023 emphasized CNS-PFS in publication / FDA briefing"
      - "Parallel: tucatinib HER2CLIMB 2020, osimertinib ADAURA adjuvant"
    limitations:
      - "Requires initial choice of molecule with CNS-friendly physicochemistry — not easily engineered in late-stage"
      - "CNS-benefit evaluation needs explicit trial design (active CNS-disease inclusion, CNS-PFS endpoint)"
      - "Advantage time-limited — next-generation competitors also engineer for CNS"
    applicable_contexts:
      - "EGFR, ALK, HER2, BRAF NSCLC / melanoma / BC programs"
      - "Late-entrant differentiation in brain-mets-prone cancers"
      - "Neurodegenerative program design (adjacent use of CNS-penetrance logic)"
    applicable_to_landscapes:
      - egfr-nsclc
      - her2
    human_reviewed: true
    reviewed_by: di

  - title: "Head-to-Head Failure Can Retire a Competitor Class Immediately"
    title_zh: "头对头试验失败可以立即终结一个竞品类别"
    lesson_type: regulatory_pathway
    pattern: |
      Unlike in many therapeutic areas where head-to-head trials
      are rare, EGFR Exon 20 had enough commercial pressure that
      Takeda and J&J both ran pivotal trials in 2023. Takeda's
      mobocertinib lost EXCLAIM-2 vs ami-chemo regimen;
      mobocertinib was withdrawn from the US market within weeks
      of the readout. A head-to-head loss in a small indication
      (EGFR exon 20 is ~3-5% of EGFR NSCLC) can be immediately
      fatal — unlike in large indications where niche positioning
      survives. Sponsors should plan for the asymmetric risk when
      committing to head-to-head trials in small subsets.
    key_evidence:
      - "Mobocertinib FDA accelerated approval 2021 → withdrawal 2023 after confirmatory PAPILLON failure"
      - "Exon 20 addressable population in US: ~4,000-6,000 patients/year — too small to sustain a losing molecule"
      - "Contrast: failed head-to-head in CLL (acalabrutinib ELEVATE-RR vs ibrutinib, 2021) did not kill acalabrutinib — larger market sustained both"
      - "Head-to-head failure → 2-3 month market reaction window → commercial decision"
    limitations:
      - "Small-indication asymmetry doesn't apply in larger markets"
      - "Regulatory context matters — accelerated approvals are more vulnerable to confirmatory failure than full approvals"
      - "Sponsor capital structure affects ability to absorb failure (Takeda kept research; smaller sponsor might fold)"
    applicable_contexts:
      - "Rare-indication commercial strategy"
      - "Head-to-head trial risk / reward analysis"
      - "Accelerated-approval confirmation timing"
    applicable_to_landscapes:
      - egfr-nsclc
      - rare-oncology
    human_reviewed: true
    reviewed_by: di
