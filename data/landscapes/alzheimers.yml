key_trials:
  - name: "CLARITY-AD"
    drug: lecanemab
    sponsor: Eisai / Biogen
    phase: phase_3
    status: met_primary
    significance: "1,795-patient early-AD Phase 3 2022 — 27% slowing CDR-SB at 18 months; basis for July 2023 Leqembi full approval; ARIA-E 13% + ARIA-H 17% class-safety baseline"
  - name: "TRAILBLAZER-ALZ 2"
    drug: donanemab
    sponsor: Eli Lilly
    phase: phase_3
    status: met_primary
    significance: "1,736-patient early-AD Phase 3 2023 — 35% slowing in low/medium-tau subgroup; basis for July 2024 Kisunla approval; time-limited regimen (stop after plaque clearance)"
  - name: "EMERGE + ENGAGE"
    drug: aducanumab
    sponsor: Biogen
    phase: phase_3
    status: conditional_failure
    significance: "Phase 3 aducanumab 2019 — EMERGE met high-dose; ENGAGE missed; post-hoc analyses controversial; FDA approved 2021 over unanimous advisory committee objection; CMS restricted coverage; withdrawn January 2024"
  - name: "GRADUATE-1 / GRADUATE-2"
    drug: gantenerumab
    sponsor: Roche
    phase: phase_3
    status: failed
    significance: "Roche anti-amyloid Phase 3 2022 — missed CDR-SB primary; demonstrated that even well-designed amyloid-antibody programs can fail; Roche exited class"
  - name: "A4 / AHEAD"
    drug: solanezumab
    sponsor: Eli Lilly
    phase: phase_3
    status: failed
    significance: "Preclinical AD primary prevention + familial AD 2023 — solanezumab (anti-monomer Aβ) failed; established that monomer-targeting antibodies don't work, only aggregated/plaque-binding ones do"
  - name: "EVOKE / EVOKE+"
    drug: semaglutide
    sponsor: Novo Nordisk
    phase: phase_3
    status: ongoing
    significance: "GLP-1 in early AD — 2025-2026 readouts; if positive, transforms field via cardiometabolic-AD bridge; negative would close GLP-1 AD hypothesis"
  - name: "EPOCH / APECS"
    drug: verubecestat
    sponsor: Merck
    phase: phase_3
    status: failed
    significance: "BACE1 inhibitor Phase 3 2017-2018 — cognitive worsening halted; established BACE inhibition as toxic; catalyzed full industry retreat from BACE class"

scientific_bottlenecks:
  - "Amyloid-Related Imaging Abnormalities (ARIA) — cerebral edema (ARIA-E 13-24% incidence) + microhemorrhage (ARIA-H 17-31%) class-wide; MRI monitoring quarterly required; limits community-setting adoption; APOE4 carriers 2-3x higher incidence"
  - "Modest clinical benefit — 27-35% slowing of CDR-SB decline equates to ~5-6 months delay in progression over 18 months; treatment-effect magnitude below patient/family expectations"
  - "Diagnostic infrastructure gap — amyloid PET + CSF biomarkers required to confirm amyloid-positive status; ~40% of clinically-diagnosed AD is not amyloid-positive; blood-based biomarkers (p-tau217) emerging but not universal"
  - "Primary prevention hypothesis failures — A4 2023 solanezumab + DIAN-TU + multiple BACE Phase 3s failed; amyloid-modification prevents dementia only in symptomatic early stage, not cognitively-normal amyloid-positive"
  - "Tau hypothesis unvalidated despite decades — multiple anti-tau programs in Phase 2/3 but no approvals; relationship between amyloid + tau pathologies + clinical decline still debated"
  - "Aduhelm 2021 regulatory precedent trust damage — advisory-committee-rejected approval + CMS restriction + January 2024 withdrawal + parallel to Elevidys 2024 undermines regulatory-science reliability"

market_dynamics: |
  Global Alzheimer's drug market reached ~$6 billion 2023 —
  dominated by generic cholinesterase inhibitors + memantine with
  Leqembi contributing ~$87M. 2024 Leqembi trajectory $400-600M;
  Kisunla 2024 Q4 launch nominal early sales. Analyst peak
  consensus: Leqembi + Kisunla combined $8-12B by 2030, subject
  to infrastructure scaling (amyloid PET + infusion centers +
  MRI monitoring capacity). The single biggest 2025-2026
  inflection is Novo Nordisk EVOKE semaglutide GLP-1 AD readout
  — if positive, could open $10B+ oral AD market. Biogen Aduhelm
  withdrawal January 2024 absorbed ~$500M in inventory + R&D
  write-offs. Roche gantenerumab failure 2022 cost Roche ~$8B in
  program NPV. Lilly's Kisunla differentiates via time-limited
  regimen (stop dosing when plaques clear, ~40% of patients at
  12 months) — reducing infusion burden vs Leqembi's indefinite
  maintenance dosing. SC formulations 2025-2026 (Leqembi SC,
  remternetug SC) will ease community-setting adoption.

regulatory_context: |
  FDA + CMS interaction on Aduhelm 2021 established a working
  template: FDA accelerated approval on surrogate amyloid
  biomarker → CMS coverage decision restricted to trial
  participants → physician refusal → commercial failure →
  withdrawal. Leqembi 2023 + Kisunla 2024 pathways navigated
  this by running CLARITY-AD + TRAILBLAZER-ALZ 2 with clinical
  primary endpoints (CDR-SB) supporting full approval → CMS
  coverage with registry requirement. FDA Alzheimer's Working
  Group + advisory committee dynamics post-Aduhelm are more
  conservative. CMS National Coverage Determination for
  monoclonal antibodies targeting amyloid 2022 limits coverage
  to registry participants — currently ~2,000 certified US
  sites. EMA approved Leqembi January 2024 after initial
  2023 rejection. China NMPA Leqembi approval September 2023
  ahead of FDA full approval — rare reverse sequence. Japan
  NICE-equivalent restrictions on Leqembi address national
  budget constraints.

hot_targets:
  - gene_symbol: APP
    name: "Amyloid Precursor Protein (APP)"
    rationale: "Source of amyloid-β; upstream of secretase cleavage; historical BACE + γ-secretase targets"
  - gene_symbol: MAPT
    name: "Tau (MAPT)"
    rationale: "Second pathological hallmark; tangle-forming protein; E2814, BIIB080, JNJ-063 Phase 2/3 programs; tau-hypothesis validation still pending"
  - gene_symbol: TREM2
    name: "TREM2 (Triggering Receptor Expressed on Myeloid cells 2)"
    rationale: "Microglial receptor; loss-of-function increases AD risk; AL002 Alector agonist Phase 2 tests gain-of-function therapeutic approach"
  - gene_symbol: APOE
    name: "Apolipoprotein E (APOE)"
    rationale: "Strongest genetic AD risk (ε4 allele ~3x homozygous risk); lipid metabolism + Aβ clearance; therapeutic strategies emerging via APOE2-mimetics + ε4-specific editing"
  - gene_symbol: GLP1R
    name: "GLP-1 Receptor"
    rationale: "Anti-inflammatory + metabolic-coupling hypothesis; Novo semaglutide EVOKE Phase 3; bridges metabolic cluster"
  - gene_symbol: GRN
    name: "Progranulin (GRN)"
    rationale: "Loss causes frontotemporal dementia; Alector AL101 Phase 2 — adjacent neurodegenerative mechanism"
  - gene_symbol: BACE1
    name: "Beta-Site APP Cleaving Enzyme 1 (BACE1)"
    rationale: "Historical failed target — verubecestat, atabecestat, umibecestat all caused cognitive worsening 2017-2019; full class discontinuation"

