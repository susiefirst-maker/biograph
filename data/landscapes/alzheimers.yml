mesh_id: D000544    # Alzheimer Disease

disease_overview: |
  Alzheimer's disease affects ~7 million Americans and ~55 million
  people globally, causing progressive cognitive + functional
  decline driven by two neuropathological hallmarks: extracellular
  amyloid-β plaques (formed by cleavage of amyloid precursor
  protein by β- and γ-secretases) and intracellular neurofibrillary
  tangles of hyperphosphorylated tau protein. The amyloid cascade
  hypothesis (Hardy + Selkoe 1992) has dominated drug development
  for three decades; until 2021 the clinical class consisted only
  of symptomatic cholinesterase inhibitors (donepezil, galantamine,
  rivastigmine) + memantine (NMDA antagonist) providing modest
  transient benefit. More than 100 amyloid-targeting Phase 3
  trials failed 1998-2019, making Alzheimer's the therapeutic
  area with the highest Phase 3 failure rate in pharma history.

  The modern era began in 2021 with Biogen's aducanumab (Aduhelm)
  — a highly controversial FDA approval over unanimous advisory
  committee objection, based on surrogate amyloid-plaque
  reduction rather than clinical outcome. CMS subsequently
  restricted coverage to clinical-trial participants only;
  physician uptake collapsed; Biogen withdrew Aduhelm January
  2024. Lecanemab (Leqembi, Eisai / Biogen) arrived January 2023
  accelerated approval + July 2023 full approval — based on
  CLARITY-AD Phase 3 showing 27% slowing of CDR-SB clinical
  decline at 18 months in early-symptomatic (MCI + mild dementia)
  amyloid-confirmed patients. Donanemab (Kisunla, Eli Lilly) was
  approved July 2024 based on TRAILBLAZER-ALZ 2 showing 35%
  slowing in a low/medium-tau subgroup. These three monoclonal
  anti-amyloid antibodies all target aggregated / plaque-form
  amyloid-β rather than monomer, and all carry the same
  **Amyloid-Related Imaging Abnormalities (ARIA)** class effect —
  cerebral edema (ARIA-E) + microhemorrhage (ARIA-H) requiring
  MRI monitoring throughout treatment.

  The 2024-2025 pipeline extends in four directions:
  (1) **Second-generation anti-amyloid** — remternetug (Lilly)
      subcutaneous + faster infusion; Biogen / Eisai next-gen
      following Leqembi.
  (2) **Anti-tau approaches** — E2814 (Eisai), JNJ-063 (Janssen),
      BIIB080 (Biogen antisense) — still Phase 2/3, tau-hypothesis
      validation pending.
  (3) **GLP-1 for Alzheimer's** — Novo Nordisk semaglutide EVOKE +
      EVOKE+ Phase 3 trials; readouts 2025-2026. Based on
      anti-inflammatory + metabolic-coupling hypotheses.
  (4) **Non-amyloid mechanisms** — TREM2 agonists (AL002 Alector),
      GLP-1 (above), microglial-inflammation approaches, α-synuclein
      (Parkinson's adjacent).

  Commercial reality: Leqembi 2023 revenue $87M, 2024 trajectory
  ~$400-600M — slower than Eisai guidance due to infusion burden
  (biweekly IV + MRI monitoring), diagnostic infrastructure gaps
  (amyloid PET + CSF biomarker confirmation), and CMS coverage
  navigating (Medicare requires clinical-registry participation).
  Kisunla 2024 launch marginally easier due to time-limited
  regimen (stop when plaques cleared). GLP-1 Alzheimer's positive
  readout would dramatically shift the landscape toward
  cardiometabolic bridges.

disease_overview_zh: |
  阿尔茨海默病影响美国约700万人、全球约5500万人,造成进行性
  认知和功能衰退,由两种神经病理学标志驱动:细胞外β-淀粉样
  蛋白(Aβ)斑块(由淀粉样前体蛋白被β-和γ-分泌酶切割形成)
  以及胞内过度磷酸化tau蛋白构成的神经原纤维缠结。淀粉样级联
  假说(Hardy + Selkoe 1992年提出)主导药物开发长达30年;
  直到2021年之前,临床治疗类别仅包括对症的胆碱酯酶抑制剂
  (多奈哌齐、加兰他敏、利凡斯的明)和美金刚(NMDA拮抗剂),
  疗效有限且短暂。1998-2019年间超过100项以淀粉样蛋白为靶点
  的III期试验失败,使阿尔茨海默病成为制药史上III期失败率
  最高的治疗领域。

  现代时代始于2021年Biogen的阿杜卡单抗(Aduhelm)— 这是
  FDA在顾问委员会一致反对下做出的极具争议的批准,基于降低
  淀粉样斑块这一替代终点而非临床结局。CMS随后将报销范围
  限定于临床试验参与者;医生处方崩盘;Biogen于2024年1月
  撤市Aduhelm。Lecanemab(Leqembi,卫材/Biogen)于2023年
  1月获加速批准、7月获完全批准 — 基于CLARITY-AD III期试验,
  在早期症状(MCI+轻度痴呆)、经淀粉样蛋白检测确认的患者中,
  18个月时CDR-SB临床衰退减慢27%。Donanemab(Kisunla,礼来)
  于2024年7月获批,基于TRAILBLAZER-ALZ 2显示在低/中tau亚组
  中减慢35%。这三种单克隆抗淀粉样抗体都靶向聚集/斑块形式的
  Aβ而非单体,都带有相同的类别效应 — **淀粉样相关影像学
  异常(ARIA)**:脑水肿(ARIA-E)+ 微出血(ARIA-H),治疗
  期间需要MRI监测。

  2024-2025管线向四个方向扩展:
  (1)**第二代抗淀粉样** — 礼来remternetug(皮下+更快输注);
  Biogen/卫材紧接Leqembi的下一代候选。
  (2)**抗tau方法** — E2814(卫材)、JNJ-063(强生)、BIIB080
  (Biogen反义核苷酸)— 仍在II/III期,tau假说验证待定。
  (3)**GLP-1用于阿尔茨海默病** — 诺和诺德司美格鲁肽EVOKE +
  EVOKE+ III期试验;2025-2026年读出。基于抗炎和代谢偶联假说。
  (4)**非淀粉样机制** — TREM2激动剂(AL002,Alector)、
  GLP-1(上述)、小胶质细胞炎症方法、α-突触核蛋白(与帕金森
  邻近)。

  商业现实:Leqembi 2023年销售额8700万美元,2024年轨迹约
  4-6亿美元 — 比卫材指引更慢,原因是输注负担(两周一次IV+
  MRI监测)、诊断基础设施不足(淀粉样PET+CSF生物标志物确认)
  以及CMS覆盖协调(Medicare要求临床登记参与)。Kisunla 2024
  年上市略易,因为限时方案(斑块清除后停药)。GLP-1阿尔茨
  海默病阳性读出将显著使景观转向心血管代谢桥接。

