    mechanism_of_action: |
      Keytruda (pembrolizumab) is a humanized IgG4 kappa monoclonal
      antibody that binds programmed cell death protein 1 (PD-1) on
      activated T cells and blocks its interaction with the ligands
      PD-L1 and PD-L2 expressed on tumor cells and antigen-presenting
      cells. This blockade releases PD-1-mediated inhibition of T-cell
      activation, restoring cytotoxic immune response against tumors.
      The IgG4 format with stabilizing S228P mutation minimizes
      antibody-dependent cellular cytotoxicity (ADCC), preserving the
      antibody's sole function as a receptor blocker rather than as a
      cell-killing agent.

    mechanism_of_action_zh: |
      Keytruda(pembrolizumab)是一种人源化IgG4 kappa单克隆抗体,
      结合活化T细胞表面的程序性死亡受体1(PD-1),阻断其与肿瘤细胞
      及抗原提呈细胞表面PD-L1和PD-L2配体的相互作用。阻断后解除
      PD-1介导的T细胞活化抑制,恢复对肿瘤的细胞毒性免疫反应。
      其IgG4格式(含S228P稳定突变)最小化抗体依赖的细胞毒作用
      (ADCC),使抗体仅作为受体阻断剂发挥作用,而非直接杀伤细胞。

    mechanism_of_action_source_refs:
      - "FDA-approved Keytruda prescribing information (current revision)"
      - "Honjo et al., PD-1 biology papers 1992-2010"
