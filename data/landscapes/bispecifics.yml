failed_trials:
  - "ROAR (catumaxomab EpCAM × CD3, pre-2017) — first-ever bispecific approval withdrawn for manufacturing issues; established format-engineering as gating constraint"
  - "SKYSCRAPER-01 (tiragolumab + atezolizumab NSCLC, 2022) — missed primary endpoint; delayed TIGIT class validation"
  - "MYSTIC (durvalumab ± tremelimumab, AZ, 2018) — not strictly a bispecific but established that Ig+Ig combinations don't reliably beat anti-PD-1 monotherapy"

