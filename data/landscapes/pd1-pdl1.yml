scientific_bottlenecks:
  - "PD-L1 biomarker heterogeneity — different assays (22C3 for Keytruda, 28-8 for Opdivo, SP142/SP263 for Roche/AZ) and different cutoffs (TPS vs CPS) across indications; non-interchangeable"
  - "Hyperprogression in 9-29% of patients depending on indication — no prospective biomarker to exclude at baseline"
  - "Immune-related adverse events (colitis, pneumonitis, hepatitis, hypothyroidism, myocarditis) affect ~15-40% depending on combination; myocarditis with nivo+ipi carries mortality"
  - "Combination fatigue — dozens of PD-1 + X trials have failed (IDO1, 4-1BB agonists early versions, CSF1R, many others) with no clear mechanistic rationale for the failures"
  - "Post-PD-1 resistance poorly characterized — second-line IO options limited, mechanisms (LAG-3, TIGIT) still unproven at scale"
  - "Head-to-head trials between Western originator PD-1s almost non-existent; cross-trial comparison is unreliable"

market_dynamics: |
  The class crossed $50 billion in global sales in 2023 led by
  Keytruda ($25B), Opdivo ($9B), Tecentriq ($3.3B), Imfinzi ($4.2B),
  and a long tail. Keytruda's 2028 US composition-patent cliff is
  the defining commercial event of the next decade — Merck's
  response is a subcutaneous formulation (KEYNOTE-555 Phase 3)
  that creates a new 20-year dosing-form patent window and shifts
  standard-of-care before IV biosimilars arrive. BMS is running
  CheckMate-67T for the same SC-Opdivo play. Meanwhile China-
  originator PD-1s (tislelizumab, toripalimab) are landing in the
  US at 40-70% list-price discount to Keytruda, pressuring net
  prices even before patent expiry. The first head-to-head win
  against pembrolizumab (ivonescimab in HARMONi-2, September 2024)
  opened a second competitive axis around PD-1×VEGF bispecifics.
  Net: class revenue still growing, but pricing power peaked.

regulatory_context: |
  FDA used accelerated approval liberally in the 2014-2020 era —
  many indications were approved on ORR / PFS before OS confirmation.
  2021's Project ODAC tightened subsequent-approval standards;
  several accelerated approvals (KEYNOTE hepatocellular, nivolumab
  hepatocellular, atezolizumab TNBC, others) have been voluntarily
  withdrawn or restricted. New FDA posture: confirmatory OS data
  required, single-region (Chinese-only) trials rejected
  (sintilimab ORIENT-11 2022). China's NMPA operates parallel
  approval tracks for domestic originators; the US-China pricing
  arbitrage (HLX10 / tislelizumab / toripalimab) is creating
  policy friction. EU is slower on label expansions but broadly
  aligned with FDA.

