# GLP-1 / Obesity curated T1 landscape.
#
# Second T1 landscape (§7.4.6 priority #2). Reuses Ozempic golden-entity
# data (semaglutide context, peptide engineering lessons) and adds the
# broader GIP/GLP-1, oral small-molecule, and amylin combinations.
#
# Unlike NASH, this landscape is a *drug class crossed with a disease
# area*. Frames: (1) type-2 diabetes → (2) obesity → (3) cardiometabolic
# risk reduction → (4) MASH / PCOS / alcohol-use follow-ons.

