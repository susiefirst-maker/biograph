mesh_id: D008956    # Proto-Oncogene Proteins p21(ras)

disease_overview: |
  KRAS is the most frequently mutated oncogene in human cancer —
  ~90% of pancreatic adenocarcinomas, ~40% of colorectal cancers,
  ~25-30% of non-small-cell lung cancers, and smaller percentages
  across gastric, endometrial, cervical, and hematologic malignancies.
  The protein was identified in 1982 (Harvey + Kirsten rat sarcoma
  viruses) and was immediately recognized as a transformative
  oncology target; for the next 40 years it was labeled
  "undruggable" due to the protein's smooth, small GTP-binding
  pocket, its picomolar substrate affinity, and the absence of
  obvious allosteric binding sites.

  The watershed was Kevan Shokat's 2013 structural discovery of
  the switch-II pocket — a cryptic groove that opens transiently in
  the GDP-bound state of KRAS G12C and can be covalently trapped by
  small molecules containing an acrylamide warhead that binds the
  Cys12 thiol. Within seven years this insight produced sotorasib
  (Amgen, Lumakras, FDA 2021) and adagrasib (Mirati, Krazati, FDA
  2022) — the first two KRAS-directed drugs in history, both
  G12C-selective and both approved initially for pre-treated
  KRAS-G12C NSCLC. Confirmatory CodeBreaK 200 (2023) missed OS,
  resulting in FDA label tightening. BMS paid $5.8 billion for
  Mirati in November 2023 — a platform-bet valuation for the
  broader KRAS portfolio, not for Krazati's stand-alone economics.

  The next wave of drugs broadens the target scope: divarasib
  (Roche/Genentech) targets G12C with higher selectivity, multiple
  Chinese-originator G12C molecules are advancing (glecirasib,
  garsorasib, olomorasib — note Lilly's olomorasib is US-developed),
  and Revolution Medicines' RMC-6236 (pan-RAS non-covalent multi-
  selective) is the most-watched late-stage molecule — potentially
  addressing the ~87% of KRAS mutations that aren't G12C (G12D,
  G12V, G13D, Q61H/L). Mirati's MRTX1133 (G12D) and RMC-9805
  (G12D-selective) target pancreatic cancer specifically, where
  G12D is the dominant mutation.

disease_overview_zh: |
  KRAS是人类癌症中最常发生突变的致癌基因 — 约90%的胰腺导管腺
  癌、40%的结直肠癌、25-30%的非小细胞肺癌,以及胃癌、子宫内膜
  癌、宫颈癌和血液肿瘤中较小比例。该蛋白于1982年被发现(Harvey
  和Kirsten大鼠肉瘤病毒),立即被认为是具有变革意义的肿瘤学
  靶点;然而在随后40年里,它因蛋白结构光滑、GTP结合口袋狭小、
  与底物纳摩尔级亲和力、缺乏明显的别构结合位点而被贴上"不可
  成药"的标签。

  分水岭是Kevan Shokat于2013年发现的转换II口袋 — 一个在KRAS
  G12C的GDP结合态中瞬时开放的隐蔽凹槽,可被含有丙烯酰胺弹头
  并与Cys12硫醇形成共价键的小分子捕获。七年内,这一洞见催生
  了索托雷塞(Sotorasib,安进,Lumakras,FDA 2021)和阿达格雷
  西(Adagrasib,Mirati,Krazati,FDA 2022)— 史上第一批KRAS
  靶向药物,均为G12C选择性,均首先获批用于经治KRAS G12C非小
  细胞肺癌。2023年确证性CodeBreaK 200试验未达到OS终点,导致
  FDA收紧了标签。2023年11月,BMS以58亿美元收购Mirati — 是
  基于更广KRAS组合的平台估值,而非Krazati的单品经济。

  下一波药物拓宽了靶点范围:divarasib(罗氏/基因泰克)针对
  G12C具有更高选择性,多款中国原研G12C分子在推进(glecirasib、
  garsorasib、olomorasib — 注意礼来的olomorasib为美国研发),
  Revolution Medicines的RMC-6236(pan-RAS非共价多选择性)是
  最受关注的晚期分子 — 有可能覆盖非G12C的约87%KRAS突变
  (G12D、G12V、G13D、Q61H/L)。Mirati的MRTX1133(G12D)和
  RMC-9805(G12D选择性)专门针对胰腺癌,后者是G12D主导的
  癌种。

