    # в”Җв”Җ English в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    discovery_narrative: |
      Humira's scientific origin traces to the 1993вҖ“1994 work of Marc Feldmann
      and Ravinder Maini at the Kennedy Institute of Rheumatology, which
      validated TNF-Оұ as a therapeutic target in rheumatoid arthritis.
      Their Lancet publications triggered a multi-company race to produce
      anti-TNF biologics.

      The molecule that became adalimumab was developed through a collaboration
      between BASF Pharma's Knoll subsidiary and Cambridge Antibody Technology
      (CAT). CAT's phage display platform вҖ” which used bacteriophage libraries
      displaying human antibody fragments to select high-affinity binders вҖ”
      produced D2E7, the first fully human anti-TNF monoclonal antibody
      identified through phage display rather than humanization of a mouse
      antibody. D2E7 entered clinical development at Knoll in 1995.

      Abbott Laboratories acquired Knoll from BASF in March 2001 for $6.9 billion,
      with D2E7 mid-Phase 3 as the anchor asset. The FDA approved D2E7 as
      Humira (adalimumab) for rheumatoid arthritis on December 31, 2002;
      the EMA followed in September 2003. Humira became the first fully human
      monoclonal antibody approved by the FDA and, over the following two
      decades, the best-selling drug in pharmaceutical history ($20.7B peak
      revenue in 2021).

