  - title: "Dosing-Convenience Differentiation Justifies Premium Platform M&A"
    title_zh: "给药便利性差异化证明了平台并购的溢价合理性"
    lesson_type: strategic_commercial
    pattern: |
      When a validated-target class has an established injectable
      incumbent, a drug offering materially less-frequent dosing
      (twice-yearly inclisiran vs monthly mAbs) can justify
      premium platform M&A multiples even without superior
      efficacy. Novartis paid $9.7B for Medicines Company in 2019
      for inclisiran — a molecule with comparable LDL-C lowering
      to evolocumab / alirocumab but dramatically different
      administration (twice yearly vs monthly biweekly). The
      dosing-convenience moat is particularly valuable for
      chronic-asymptomatic indications (lipids, hypertension)
      where adherence is the dominant clinical outcome driver.
      Sponsors should evaluate dosing-interval differentiation as
      a separate axis from efficacy when valuing late-stage
      platform acquisitions.
    key_evidence:
      - "Novartis-Medicines Company $9.7B 2019 — largest pure cardiometabolic deal of decade; priced dosing-interval platform not efficacy"
      - "Inclisiran 2021 revenue ~$0 → 2023 ~$470M with twice-yearly dosing; analyst peak ~$2B despite lagging initial ramp"
      - "Alnylam GalNAc siRNA platform value realized across multiple hepatic targets post-inclisiran validation (ATTR, hemophilia, others)"
      - "Parallel: Regeneron DUPIXENT monthly dosing premium over twice-weekly competitors drove 2019-2024 category dominance"
    limitations:
      - "Requires target where adherence matters more than efficacy ceiling — cancer and acute indications are less sensitive"
      - "Payer resistance to higher absolute-cost drugs can blunt convenience advantage — inclisiran prior-auth persistence"
      - "Newer modalities (oral siRNA, oral peptide) may reset the dosing-interval frontier"
    applicable_contexts:
      - "Chronic-disease pipeline acquisition valuation"
      - "Late-stage platform vs single-asset M&A decisions"
      - "Convenience / adherence / efficacy tradeoff modeling"
    applicable_to_landscapes:
      - pcsk9
      - glp1-obesity
      - cardiometabolic
    human_reviewed: true
    reviewed_by: di
