    drug: VERVE-101
    sponsor: Verve Therapeutics
    phase: phase_1
    status: failed
    significance: "Grade 4 thrombocytopenia + ALT elevation in single patient Q4 2023 → program paused; pivot to VERVE-102 (LDLR rather than PCSK9) announced 2024"
  - name: "HOPE-B"
