lessons:
  - title: "Biopsy-Dependent Endpoints Slow Development; Non-Invasive Biomarker Investment is a Timing Arbitrage"
    title_zh: "依赖活检的终点减缓开发进度;非侵入性生物标志物投资是一种时机套利"
    lesson_type: clinical_development
    pattern: |
      When a therapeutic area's regulatory endpoint requires invasive
      procedures (liver biopsy for NASH), enrollment and endpoint
      adjudication bottleneck every program in the field. Companies
      that independently invest in non-invasive biomarker
      qualification (FibroScan-AST, ELF, cT1) may secure the first
      regulatory-qualified surrogate in their domain, converting a
      field-wide tax into a per-company moat. Madrigal's parallel
      biomarker program contributed to MAESTRO-NASH's operational
      success; the next-generation FGF21 and GLP-1 sponsors are
      pursuing similar tracks.
    key_evidence:
      - "MAESTRO-NASH enrollment took ~4 years despite favorable drug mechanism"
      - "FDA 2018 NASH guidance still requires biopsy for approval"
      - "Resmetirom label includes optional cT1 MRI as a diagnostic pathway"
    limitations:
      - "Biomarker qualification is a 5-10 year effort; only relevant for companies with long-term horizons"
      - "FDA qualification ≠ clinical standard-of-care adoption; both are needed"
    applicable_contexts:
      - "NASH drug development"
      - "Any therapeutic area where biopsy gates regulatory endpoint"
    applicable_to_landscapes:
      - nash
      - hepatic-fibrosis
    human_reviewed: true
    reviewed_by: di

  - title: "First-in-Class Mechanism in Heterogeneous Disease Wins a Narrow Label; Combination is the Durable Strategy"
    title_zh: "异质性疾病中的首创机制赢得窄标签;联合用药是可持续战略"
    lesson_type: strategic_commercial
    pattern: |
      NASH patient heterogeneity (lean vs obese, fibrotic vs inflammatory
      dominant) means a single monotherapy mechanism likely addresses
      30-50% of patients optimally. Resmetirom's 2024 approval is a
      narrow label (NASH with fibrosis F2-F3, specific inclusion
      criteria). The durable commercial winners will be combination
      regimens pairing a THR-β / FXR agent with a GLP-1 RA or FGF21
      analogue — similar to HIV or oncology's transition from
      monotherapy to cocktails. Sponsors who design combination trials
      early capture the "second-wave premium" that late entrants miss.
    key_evidence:
      - "Rezdiffra US label: NASH with fibrosis F2/F3 only; excludes cirrhosis"
      - "Precedent: HIV (AZT monotherapy 1987 → HAART combination 1996), oncology (IO-chemo combinations)"
      - "Novo ESSENCE already designed for potential resmetirom-semaglutide combination follow-on"
    limitations:
      - "Combination trials require ~2-3x patients and timelines; capital barrier"
      - "Combination pricing + payer negotiation is structurally harder than monotherapy"
    applicable_contexts:
      - "NASH program strategy after 2024"
      - "Heterogeneous chronic-disease drug development"
    applicable_to_landscapes:
      - nash
      - obesity
    human_reviewed: true
    reviewed_by: di
