      (Kd ~0.1 nM)з»“еҗҲTNF-Оұе№¶йҳ»ж–ӯе…¶дёҺp55(TNFR1)е’Ңp75(TNFR2)з»ҶиғһиЎЁйқў
      еҸ—дҪ“зҡ„зӣёдә’дҪңз”Ё,д»ҺиҖҢжҠ‘еҲ¶TNF-Оұй©ұеҠЁзҡ„NF-ОәBе’ҢMAPKзӮҺз—ҮдҝЎеҸ·йҖҡи·ҜгҖӮ
