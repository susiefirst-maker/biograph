disease_overview: |
  NASH (nonalcoholic steatohepatitis), renamed MASH (metabolic
  dysfunction-associated steatohepatitis) in 2023, is the progressive
  inflammatory form of nonalcoholic fatty liver disease characterized
  by hepatic steatosis (≥5% of hepatocytes), lobular inflammation,
  and hepatocyte ballooning, typically with fibrosis. It sits
  downstream of insulin resistance, obesity, and type 2 diabetes —
  shared risk factors with cardiovascular disease. An estimated
  30 million Americans have NAFLD and ~5–6 million have NASH;
  global prevalence is rising in parallel with obesity. Without
  therapy, ~20% of NASH patients progress to cirrhosis, and NASH is
  now the second-leading indication for liver transplantation in the
  United States. Clinical trials gate endpoints on liver biopsy
  histology (NAS score, fibrosis stage per NASH CRN), a constraint
  that slows enrollment and amplifies placebo noise. The FDA's 2018
  NASH draft guidance established the accelerated-approval pathway
  on NASH resolution OR ≥1-stage fibrosis improvement without
  worsening of the other.

disease_overview_zh: |
  非酒精性脂肪性肝炎(NASH,2023年更名为MASH — 代谢功能障碍相关
  脂肪性肝炎)是非酒精性脂肪性肝病(NAFLD)的进展性炎症阶段,
  特征为肝细胞脂肪变性(≥5%肝细胞)、小叶炎症及肝细胞气球样
  变,常伴纤维化。其上游驱动因素包括胰岛素抵抗、肥胖和2型糖尿病
  — 与心血管疾病风险因素重叠。美国约3000万人患NAFLD,500-600万
  人患NASH;全球患病率随肥胖增长而上升。未经治疗,约20%的NASH
  患者进展至肝硬化,NASH现已成为美国第二大肝移植适应症。临床
  试验的终点基于肝活检组织学评分(NAS评分、NASH CRN纤维化分期),
  该约束减缓入组速度并放大安慰剂效应。FDA 2018年NASH指南确立了
  加速审批路径:NASH消退或纤维化改善≥1级且另一项不恶化。

