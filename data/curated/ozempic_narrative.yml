    mechanism_of_action: |
      Semaglutide is a glucagon-like peptide-1 receptor agonist (GLP-1
      RA). It binds the GLP-1 receptor, a G-protein-coupled receptor
      expressed on pancreatic β-cells, gut, CNS appetite centers, and
      cardiovascular tissues. Activation amplifies glucose-dependent
      insulin secretion, suppresses glucagon release, slows gastric
      emptying, and reduces appetite via hypothalamic signaling. The
      molecule is a 31-amino-acid analogue of native GLP-1 with three
      modifications extending half-life from ~2 minutes to ~165 hours:
      (1) Aib8 substitution resisting DPP-4 cleavage, (2) Arg34
      substitution, and (3) a C18 diacid fatty-acid linker via an
      AEEAc spacer at Lys26 enabling reversible albumin binding.

    mechanism_of_action_zh: |
      司美格鲁肽是一种胰高血糖素样肽-1受体激动剂(GLP-1 RA)。
      它与GLP-1受体结合 — 这是一种G蛋白偶联受体,在胰岛β细胞、
      肠道、中枢神经系统食欲中枢及心血管组织中均有表达。激活
      后放大葡萄糖依赖的胰岛素分泌,抑制胰高血糖素释放,减缓
      胃排空,并通过下丘脑信号通路减少食欲。该分子是天然GLP-1
      的31个氨基酸类似物,含三处修饰使半衰期从约2分钟延长至
      约165小时:(1)Aib8替换抵抗DPP-4酶切割;(2)Arg34替换;
      (3)通过AEEAc间隔基在Lys26位连接的C18二酸脂肪酸链实现
      可逆性白蛋白结合。

    mechanism_of_action_source_refs:
      - "FDA-approved Ozempic prescribing information (current revision)"
      - "Lau et al., 'Discovery of the Once-Weekly Glucagon-Like Peptide-1 (GLP-1) Analogue Semaglutide', J Med Chem 2015"
