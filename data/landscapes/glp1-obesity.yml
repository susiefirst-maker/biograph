mesh_id: D052216    # Glucagon-Like Peptide 1

disease_overview: |
  GLP-1 receptor agonists (GLP-1 RAs) are the defining therapeutic
  class of 2020s cardiometabolic medicine. Native GLP-1 is an
  incretin hormone released by intestinal L-cells after meals; it
  amplifies glucose-dependent insulin secretion, suppresses glucagon,
  slows gastric emptying, and acts on hypothalamic satiety centers.
  Its 2-minute native half-life made direct use impractical until
  peptide engineers developed fatty-acid-anchored albumin-binding
  analogues in the 1990s–2010s.

  Novo Nordisk's liraglutide (Victoza, 2010) was the first long-acting
  clinical-grade GLP-1 RA; semaglutide (Ozempic 2017, Wegovy 2021,
  Rybelsus 2019) extended dosing to once-weekly and introduced the
  first oral GLP-1 RA. Eli Lilly's tirzepatide (Mounjaro 2022,
  Zepbound 2023) added GIP agonism to GLP-1, yielding ~22.5% mean
  weight reduction in SURMOUNT-1 vs ~15% with Wegovy in STEP-1.
  Retatrutide (Lilly, Phase 3) adds glucagon receptor agonism as a
  triple agonist.

  The 2023 SELECT trial (semaglutide 2.4 mg in overweight/obese
  patients without diabetes) showed a ~20% reduction in major
  adverse cardiovascular events independent of glycemic effect —
  the first obesity drug to demonstrate hard CV outcome benefit.
  FDA's March 2024 Wegovy CV-risk-reduction label is the first
  obesity pharmacotherapy approved on a CV outcome, unlocking a
  reimbursement pathway distinct from the historically-excluded
  obesity drug category.

  The class now drives the most valuable commercial position in
  global pharma (Novo Nordisk and Eli Lilly combined market cap
  exceeded $1T in 2023–2024). Supply constraints, payer friction,
  and competitive positioning — not efficacy — are the defining
  market questions for the next three years.

disease_overview_zh: |
  GLP-1受体激动剂(GLP-1 RA)是2020年代心血管代谢医学中最具代表性
  的治疗药物类别。天然GLP-1是肠道L细胞在进食后分泌的一种肠促胰
  岛素激素;它放大葡萄糖依赖的胰岛素分泌,抑制胰高血糖素,延缓
  胃排空,并作用于下丘脑饱食中枢。其天然2分钟的半衰期使直接治
  疗应用不切实际,直到1990–2010年代多肽工程师开发出脂肪酸锚定
  的白蛋白结合类似物。

  诺和诺德的利拉鲁肽(Victoza,2010年)是第一个长效临床级GLP-1
  RA;司美格鲁肽(Ozempic 2017、Wegovy 2021、Rybelsus 2019)将
  给药延长至每周一次,并引入了首个口服GLP-1 RA。礼来的替尔泊肽
  (Mounjaro 2022、Zepbound 2023)在GLP-1基础上增加GIP激动作用,
  在SURMOUNT-1中达到约22.5%的平均减重,对比Wegovy STEP-1的约15%。
  Retatrutide(礼来,Ⅲ期)作为三重激动剂进一步增加胰高血糖素受
  体激动作用。

  2023年SELECT试验(2.4 mg司美格鲁肽用于无糖尿病的超重/肥胖患者)
  显示重大不良心血管事件(MACE)减少约20%,独立于降糖效应 — 这
  是首个在心血管硬终点上显示获益的肥胖药物。FDA 2024年3月Wegovy
  心血管风险降低适应症是首个基于心血管结局获批的肥胖药物,打通了
  与历史上被排除的肥胖药物类别不同的报销通道。

  该药物类别已成为全球制药业最具商业价值的细分领域(2023–2024年
  诺和诺德与礼来合计市值超过1万亿美元)。供应约束、支付方摩擦
  及竞争定位 — 而非疗效 — 是未来三年决定市场格局的关键问题。

