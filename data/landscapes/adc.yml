# ADC (Antibody-Drug Conjugates) — curated T1 landscape.
#
# §7.4.6 priority #4. Fourth curated landscape. Modality class (not
# disease). Bridge to HER2 and oncology landscapes via T-DXd.
# Explosive commercial momentum post-2019 (DESTINY-Breast readouts);
# Seagen / Pfizer 2023 $43B acquisition was the defining M&A event.

