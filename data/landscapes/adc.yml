scientific_bottlenecks:
  - "Interstitial lung disease (ILD) — ~10-15% any-grade with T-DXd, 1-2% Grade ≥3; mechanism unclear; requires rigorous monitoring + dose-reduction algorithms"
  - "On-target off-tumor toxicity — payloads are ultra-potent; low-level target expression on normal tissue (e.g., TROP2 in skin, epithelia) drives mucositis / diarrhea / neutropenia"
  - "Linker stability in circulation — premature payload release before internalization causes systemic toxicity; cleavable vs non-cleavable tradeoff not solved"
  - "Manufacturing complexity — 3-step synthesis (antibody + linker + payload), low DAR heterogeneity control, QC is expensive; COGS roughly 2-4x a naked antibody"
  - "Bystander-effect double-edge — membrane-permeable payloads kill neighboring antigen-negative cells (efficacy benefit) but also spread toxicity"
  - "Target antigen heterogeneity — tumor ~20-40% of cells often express target; payload potency + bystander have to overcome that"

market_dynamics: |
  Global ADC market crossed $10 billion in 2023 and is projected to
  exceed $50 billion by 2030 per analyst consensus. Enhertu alone
  reached ~$3.8 billion in 2024 with trajectory to $10-12 billion
  peak; Padcev reached ~$1.6 billion; Trodelvy ~$1.3 billion. The
  2023 Pfizer-Seagen $43 billion acquisition (~4x Seagen 2022
  revenue) was the largest ADC-driven M&A deal and repriced the
  entire ADC M&A market — AbbVie-ImmunoGen $10B (2023), Merck-Kelun
  $1.4B upfront + $9.3B milestones (2022) followed at premium
  multiples. Chinese out-licensing has become the dominant
  partnership structure: DualityBio-BioNTech $1.5B 2023,
  DualityBio-GSK $1.5B 2024, LaNova-Merck $590M 2024.

regulatory_context: |
  FDA accelerated approval pathway used heavily in 2019-2023 ADC
  wave; Project ODAC confirmatory-data tightening has pulled some
  early accelerated approvals (blinatumomab-comparator confusion,
  Mylotarg 2010 withdrawal historical precedent). T-DXd's HER2-low
  label expansion required FDA to essentially re-categorize HER2
  diagnostics — the 2022 label change was the biggest companion-
  diagnostic redefinition since HER2 itself in 1998. ILD guidance
  updated 2023 with class-specific monitoring requirements. FDA is
  signaling heightened scrutiny of Chinese single-region pivotal
  data post-sintilimab 2022 (PD-1) rejection; multi-region trials
  are now the safer path for Chinese-originator ADCs seeking US
  approval.

