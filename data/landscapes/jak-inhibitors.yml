# JAK Inhibitors — curated T1 landscape.
#
# §7.4.6 priority #11. Tenth curated landscape. Opens the
# autoimmune / inflammatory dimension (previously only metabolic
# and oncology clusters existed). Canonical case study for FDA
# class-wide boxed warnings: 2021 ORAL Surveillance permanently
# repositioned JAK inhibitors behind TNF biologics in RA first-line,
# a precedent the CAR-T P7-D9 lesson directly cross-references.

