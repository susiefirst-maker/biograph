# Bispecific Antibodies — curated T1 landscape.
#
# §7.4.6 priority #12. Ninth curated landscape. Modality class that
# bridges the oncology cluster (PD-1/HER2/EGFR/ADC) with the
# cell-therapy cluster (CAR-T shares targets BCMA, CD19, CD20,
# GPRC5D). Rapidly expanding post-2022 — T-cell-engagers + dual
# checkpoint + payload-free dual-target all accelerating.

