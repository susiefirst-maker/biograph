scientific_bottlenecks:
  - "Acquired resistance heterogeneity — post-osimertinib progression has ≥20 described mechanisms (C797S, MET amp, HER2 amp, small-cell transformation, HER3 upregulation, PIK3CA, RB1 loss, etc.); no single resistance regimen covers them all"
  - "C797S resistance requires 4th-gen TKI — configurationally incompatible with 1st/3rd-gen binding modes; development difficult"
  - "Brain-metastasis penetration — 1st/2nd-gen TKIs poor; osimertinib + amivantamab + lazertinib all better but still imperfect"
  - "EGFR exon 20 insertions are structurally diverse (20+ variants) with different drug sensitivities; single-drug coverage incomplete"
  - "IO + TKI combinations uniformly failed (CAURAL, CheckMate-370) — increased ILD without PFS benefit; immunotherapy addition is a closed door"
  - "Adjuvant space crowded but uncertain — ADAURA OS benefit modest; choice between adjuvant osimertinib and systemic surveillance is cost- and genotype-dependent"

market_dynamics: |
  Global EGFR NSCLC TKI market reached ~$7-8 billion in 2023,
  dominated by osimertinib / Tagrisso (~$5.8 billion, ~75% share).
  AstraZeneca's franchise is approaching peak but faces 2028-2031
  patent-cliff timing — composition claims expire 2028 US, 2032 EU.
  J&J's MARIPOSA-driven amivantamab + lazertinib launch creates
  the first meaningful competitive pressure since 2018; analyst
  consensus projects MARIPOSA regimen to ~$2-3 billion peak by
  2028. Chinese 3rd-gen originators (aumolertinib, furmonertinib)
  dominate China domestic market at ~30-50% price discount but
  have limited ex-China uptake. Dizal's sunvozertinib 2024 FDA
  approval for exon 20 is the first Chinese-originator EGFR NSCLC
  success in the US; outbound-licensing interest is rising. Next
  major inflection: first 4th-gen C797S approval (likely 2027-2028)
  + patritumab deruxtecan post-TKI HER3 ADC Phase 3 readouts.

regulatory_context: |
  EGFR NSCLC was the first solid-tumor genotype with FDA-required
  companion diagnostic (gefitinib 2004 post-hoc restriction). FDA
  has accepted PFS endpoint for all major 1L approvals (FLAURA,
  MARIPOSA); OS confirmation typically follows but is not
  gating. Adjuvant ADAURA approval (2020) was based on DFS hazard
  ratio of 0.20 — a historically favorable regulatory threshold.
  Post-sintilimab 2022 rejection (PD-1, separate issue), FDA has
  tightened stance on single-region Chinese data; Dizal's
  sunvozertinib 2024 approval was notable in clearing this bar
  with a multi-region Phase 2. China NMPA operates parallel
  approval tracks at faster timelines for domestic originators —
  aumolertinib and furmonertinib approved in China years before
  they sought (or succeeded in seeking) FDA review.

