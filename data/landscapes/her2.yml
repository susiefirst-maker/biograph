lessons:
  - title: "Biomarker-Defined Indications Compound Through Diagnostic-Category Redefinition"
    title_zh: "生物标志物定义的适应症通过诊断分类重新定义实现复合增长"
    lesson_type: strategic_commercial
    pattern: |
      Once a target like HER2 is established as a clinically
      actionable biomarker, sustained investment in redefining the
      diagnostic threshold expands the addressable population more
      efficiently than chasing new targets. The HER2 progression —
      HER2+ (1998) → HER2-low (2022) → HER2-ultralow (2023) →
      tissue-agnostic HER2+ (2024) — tripled the eligible patient
      population over 25 years without adding a target. Each
      category required (a) a therapy with activity below the old
      threshold and (b) regulatory + diagnostic infrastructure to
      formalize the new scoring. Sponsors investing in both layers
      capture the expansion; sponsors investing in only the therapy
      (Kadcyla stayed HER2+ only, lost HER2-low to Enhertu) miss it.
    key_evidence:
      - "HER2+ breast cancer ~15-20% prevalence; HER2-low adds ~40-50% of breast; HER2-ultralow adds another ~10-15% → ~3x population expansion"
      - "T-DXd HER2-low sales segment from 2022 approval → $1B+ by 2024"
      - "FDA updated HER2 scoring guidance in 2023 specifically for HER2-low — companion-diagnostic infrastructure followed the therapy"
      - "Tissue-agnostic approval (DESTINY-PanTumor02 2024) extended HER2 beyond breast/gastric to biliary, endometrial, ovarian, bladder — fourth expansion"
    limitations:
      - "Requires mechanism that works at lower target expression — not all biomarker classes qualify (e.g., EGFR T790M is binary)"
      - "Diagnostic-redefinition regulatory effort is 3-5 years; competitors can catch up during the window"
      - "Lab implementation lag means commercial uptake trails label by 12-24 months"
    applicable_contexts:
      - "HER2, HER3, TROP2, FRα biomarker programs"
      - "Long-horizon pharma strategy for validated solid-tumor targets"
      - "Diagnostic company partnership decisions"
    applicable_to_landscapes:
      - her2
      - adc
      - oncology-biomarkers
    human_reviewed: true
    reviewed_by: di

  - title: "Brain-Penetrant Follow-ons Capture Disproportionate Share in CNS-Heavy Disease Contexts"
    title_zh: "透脑后来者在中枢神经系统高发疾病中获取超额份额"
    lesson_type: clinical_development
    pattern: |
      When 30-50% of a metastatic patient population develops CNS
      metastases and the established therapy doesn't cross the blood-
      brain barrier, a brain-penetrant follow-on captures a
      disproportionate share of late-line treatment and expands
      total franchise value even when intrinsic systemic activity is
      similar. Tucatinib (Seagen 2020) was a third-generation HER2
      TKI — later, smaller, less-marketed than lapatinib or
      neratinib — but its brain-penetrant profile gave it a HER2CLIMB
      label expansion that none of the earlier HER2 agents could
      match. Pfizer's $43B Seagen acquisition priced the brain-
      penetrant franchise as a meaningful chunk of the deal.
    key_evidence:
      - "HER2+ metastatic BC: ~30-50% lifetime CNS metastasis incidence"
      - "HER2CLIMB 2020 showed tucatinib+trastuzumab+capecitabine doubled CNS-PFS vs trastuzumab+cap"
      - "Tucatinib share in HER2+ 3L+ grew from 0 (2019) to ~40% (2023) driven by CNS prescribing"
      - "T-DXd also crosses BBB better than trastuzumab — extends same logic to ADC modality"
    limitations:
      - "Specific to brain-metastasis-prone cancers (HER2+ BC, EGFR-mutant NSCLC, melanoma); less relevant for primary CNS non-tumor contexts"
      - "Brain-penetrant chemistry is hard — small molecules have more success than antibodies; always a late-line design constraint"
      - "CNS-benefit differentiation requires explicit trial design (CNS-PFS endpoints, active CNS disease inclusion)"
    applicable_contexts:
      - "HER2 program lifecycle planning"
      - "EGFR-mutant NSCLC TKI generations (osimertinib CNS-penetrant vs gefitinib)"
      - "Late-stage follow-on differentiation strategy in crowded targeted-therapy classes"
    applicable_to_landscapes:
      - her2
      - egfr-nsclc
    human_reviewed: true
    reviewed_by: di

  - title: "Biosimilar Entry Reshapes Net Pricing Without Eliminating Franchise Value"
    title_zh: "生物类似药进入重塑净价格但不消灭特许经营权价值"
    lesson_type: market_access_pricing
    pattern: |
      When a biologic franchise faces biosimilar entry, list price
      stays nominal while net realized price falls 40-60% over 3-5
      years. But brand-franchise investment in adjacent
      improvements (subcutaneous formulation, fixed-dose combinations,
      ADC follow-ons, adjuvant indications) preserves substantial
      franchise value. Herceptin (biosimilar 2019+) saw volume
      share drop to ~20-30% in the US within 3 years — but Roche
      total HER2 franchise (Phesgo + Kadcyla + share of Enhertu
      milestones via Genentech legacy) remained multi-billion.
      Sponsors who plan biosimilar defense as a lifecycle problem
      (not a cliff event) retain more economics than those who
      treat it as terminal.
    key_evidence:
      - "Trastuzumab biosimilars launched 2019 (US); 6 approved by 2024"
      - "Herceptin US net revenue dropped ~50% between 2019 and 2022"
      - "Phesgo (subcutaneous P+T, 2020) + Kadcyla adjuvant (KATHERINE) backfilled meaningful volume"
      - "Roche total HER2 franchise revenue 2022 ~$6B despite biosimilar erosion from peak ~$11B"
    limitations:
      - "Requires a portfolio of adjacent assets to backfill — single-molecule franchises get hit harder"
      - "Subcutaneous / fixed-dose reformulations require Phase 3 bridging studies + manufacturing capex"
      - "Next-generation molecule (T-DXd in Roche's case via Genentech partnership quirks) may partially substitute even before biosimilars — double-pressure"
    applicable_contexts:
      - "Biologic lifecycle planning 5-10 years before patent cliff"
      - "Biosimilar-vs-reformulation strategy decisions (Phesgo precedent)"
      - "Financial modeling of post-cliff franchise revenue"
    applicable_to_landscapes:
      - her2
      - biosimilar-dynamics
    human_reviewed: true
    reviewed_by: di
