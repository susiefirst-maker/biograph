# CRISPR / Gene Therapy — curated T1 landscape.
#
# §7.4.6 priority #9. Fourteenth curated landscape. Modality class
# covering CRISPR-Cas gene editing (ex-vivo + in-vivo), AAV
# gene therapy, lentiviral vectors, and emerging base / prime
# editing. Bridges CAR-T (allogeneic gene-edited constructs) and
# mRNA (LNP delivery platform shared with in-vivo CRISPR).

