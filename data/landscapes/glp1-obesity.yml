scientific_bottlenecks:
  - "Manufacturing capacity is a multi-year capex bet; Novo + Lilly each committed >$10B to peptide capacity through 2029"
  - "Small-molecule GLP-1 tolerability (transaminase elevations in Pfizer's program) — not yet a class property but a structural risk for oral chemotypes"
  - "GI tolerability (nausea, vomiting) still drives ~20% discontinuation in Phase 3; dose-escalation schemes help but don't eliminate"
  - "Sarcopenia / muscle-mass loss in patients losing >15% body weight — emerging safety signal needing long-term data"
  - "Durability post-discontinuation: STEP-4 showed ~2/3 of weight regained within one year off semaglutide"

market_dynamics: |
  The combined semaglutide + tirzepatide franchise crossed $45 billion
  in 2023 global sales and is projected to exceed $100 billion by 2030
  per analyst consensus. Novo Nordisk and Eli Lilly combined market
  cap exceeded $1 trillion in 2024 — making GLP-1s the most valuable
  single-class pharmaceutical story since statins. Pricing remains
  premium (~$1,000-$1,300 US list per month for Wegovy/Zepbound; lower
  in EU and net of rebates). Medicare Part D has historically excluded
  "weight-loss drugs"; March 2024 Wegovy CV label opens a reimbursement
  route, and proposed Congressional legislation (TROA) would expand
  coverage further. Compounding pharmacies exploit drug-shortage
  rules to supply off-brand semaglutide and tirzepatide at deep
  discount — the FDA lifted Wegovy shortage status in February 2025,
  moving to shut this down. Generic / biosimilar erosion is 2031+
  (semaglutide) and 2036+ (tirzepatide) based on patent cliffs.

regulatory_context: |
  FDA accelerated weight-management approval framework (2014 Saxenda
  precedent) still governs the obesity pathway. CV outcome approval
  (Wegovy March 2024) is the first of its kind and templates a route
  for future label expansions. EMA is less flexible — Wegovy CV label
  pending at time of writing. CMS Part D exclusion on obesity drugs
  is the single biggest commercial friction; legislation proposed but
  not enacted. Chinese NMPA has approved semaglutide (2021) and
  tirzepatide (2024); domestic ecnoglutide and mazdutide programs
  from Innovent + Shanghai Benemae are advancing.

