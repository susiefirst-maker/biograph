    drug: exa-cel (Casgevy)
    sponsor: Vertex / CRISPR Therapeutics
    phase: phase_3
    status: met_primary
    significance: "Ex-vivo CRISPR-edited autologous HSCs in severe sickle cell + transfusion-dependent β-thalassemia; 29 of 30 SCD patients vaso-occlusion-free post-infusion; basis for December 2023 first-ever CRISPR approval"
  - name: "MAGNITUDE (NTLA-2001)"
    drug: NTLA-2001
    sponsor: Intellia / Regeneron
    phase: phase_3
    status: ongoing
    significance: "First in-vivo CRISPR Phase 3 — LNP-delivered Cas9 targeting hepatic TTR in transthyretin amyloidosis; if positive, validates in-vivo CRISPR modality"
