mesh_id: D061987    # Antibodies, Bispecific

disease_overview: |
  Bispecific antibodies (BsAbs) bind two distinct antigens with a
  single molecule, enabling mechanisms unavailable to conventional
  monoclonal antibodies: redirecting T-cells to tumors (CD3-based
  T-cell engagers), blocking two pathways simultaneously, or
  anchoring a payload to one antigen while binding another for
  internalization. The concept was described theoretically in the
  1980s but was manufacturing-limited until the 2010s; the
  watershed was Amgen's blinatumomab (Blincyto, 2014) — the first
  BiTE (bispecific T-cell engager), approved for relapsed/
  refractory B-ALL.

  The field accelerated sharply 2021-2024. By 2025 there are 13+
  FDA-approved bispecific antibodies in oncology and ≥5 in other
  indications (hemophilia, age-related macular degeneration). The
  categories:
  (1) **CD3-based T-cell engagers** — redirect cytotoxic T-cells to
      tumor antigens. Approvals: blinatumomab (CD19), mosunetuzumab
      / glofitamab / epcoritamab (CD20), teclistamab / elranatamab
      / linvoseltamab (BCMA), talquetamab (GPRC5D), tarlatamab
      (DLL3 SCLC), tebentafusp (gp100 TCR-mimetic uveal melanoma).
  (2) **Payload-free dual-target antibodies** — block two pathways
      without T-cell recruitment. Amivantamab (EGFR × MET) for NSCLC,
      zanidatamab (HER2 biparatopic) for biliary tract, zenocutuzumab
      (HER2 × HER3) Phase 3.
  (3) **Dual-checkpoint / immuno-oncology combinations** — PD-1 +
      VEGF (ivonescimab AK112 from Akeso/Summit; first-ever
      head-to-head superiority vs pembrolizumab in HARMONi-2 NSCLC
      2024), PD-1 + LAG-3, PD-1 + TIGIT (tiragolumab, ociperlimab).
  (4) **Non-oncology bispecifics** — emicizumab (FIXa × FX,
      hemophilia A 2017), faricimab (VEGF-A × Ang-2, AMD 2022).

  The category has 5+ competing platform formats: DuoBody (Genmab/
  AbbVie), CrossMab (Roche), XmAb (Xencor), HexaBody (Genmab),
  KiH (knob-in-hole, Roche/Genentech legacy). Each trades off
  half-life, manufacturability, tissue penetration, and immune-
  effector-function control. Chinese bispecific pipeline is
  explosive — Akeso, Innovent, Harbour BioMed, and others cover
  nearly every target pair.

disease_overview_zh: |
  双特异性抗体(BsAb)通过单一分子同时结合两种不同抗原,实现了
  传统单抗无法达到的机制:将T细胞引导至肿瘤(基于CD3的T细胞
  接合器)、同时阻断两条通路、或锚定一种抗原并结合另一抗原以
  实现内化递送。该概念早在1980年代就已提出,但受限于生产能力
  直到2010年代才实现;分水岭是2014年安进的贝林妥欧(Blincyto)
  — 首个BiTE(双特异性T细胞接合器),获批用于复发/难治B-ALL。

  2021-2024年间该领域加速发展。截至2025年,FDA批准了13款以上
  肿瘤领域双特异性抗体,以及5款以上其他适应症(血友病、年龄
  相关性黄斑变性)用药。类别划分:
  (1)**基于CD3的T细胞接合器** — 将细胞毒性T细胞引导至肿瘤
  抗原。获批:blinatumomab(CD19)、mosunetuzumab / glofitamab /
  epcoritamab(CD20)、teclistamab / elranatamab / linvoseltamab
  (BCMA)、talquetamab(GPRC5D)、tarlatamab(DLL3小细胞肺癌)、
  tebentafusp(gp100 TCR仿生,葡萄膜黑色素瘤)。
  (2)**无载荷双靶点抗体** — 阻断两条通路但不招募T细胞。
  amivantamab(EGFR × MET)用于NSCLC、zanidatamab(HER2双互
  补位)用于胆道癌、zenocutuzumab(HER2 × HER3)Ⅲ期。
  (3)**双免疫检查点 / 免疫肿瘤联合** — PD-1 + VEGF(Akeso/
  Summit的ivonescimab/AK112;在2024年HARMONi-2非小细胞肺癌
  试验中首次头对头优于pembrolizumab)、PD-1 + LAG-3、PD-1 +
  TIGIT(tiragolumab、ociperlimab)。
  (4)**非肿瘤双特异性** — emicizumab(FIXa × FX,A型血友病
  2017年)、faricimab(VEGF-A × Ang-2,黄斑变性2022年)。

  该类别有5种以上竞争平台格式:DuoBody(Genmab/艾伯维)、
  CrossMab(罗氏)、XmAb(Xencor)、HexaBody(Genmab)、KiH
  (knob-in-hole,罗氏/基因泰克传统格式)。每种格式在半衰期、
  可生产性、组织穿透性、免疫效应功能控制之间做出不同取舍。
  中国双特异性管线爆发式增长 — Akeso、信达、和铂医药等覆盖
  几乎所有靶点对。

