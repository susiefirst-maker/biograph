mesh_id: D000077546    # Immune Checkpoint Inhibitors

disease_overview: |
  The PD-1 / PD-L1 axis is the dominant therapeutic class of modern
  immuno-oncology. PD-1 (PDCD1) is a T-cell co-inhibitory receptor
  whose engagement by its ligands PD-L1 (CD274) and PD-L2 (PDCD1LG2)
  — often upregulated on tumor cells and tumor-infiltrating myeloid
  cells — suppresses cytotoxic T-cell function. Antibody blockade of
  the axis restores anti-tumor immunity. Tasuku Honjo (Kyoto) and
  James Allison (MDACC) shared the 2018 Nobel Prize for checkpoint
  biology; Allison's CTLA-4 program (ipilimumab, 2011) and the
  subsequent anti-PD-1 wave (nivolumab + pembrolizumab, both 2014)
  established checkpoint inhibition as the fourth pillar of oncology
  treatment alongside surgery, chemotherapy, and radiation.

  By 2025, the class contains 13+ approved antibodies: pembrolizumab
  (Keytruda, Merck), nivolumab (Opdivo, BMS), cemiplimab (Libtayo,
  Regeneron), dostarlimab (Jemperli, GSK), tislelizumab (Tevimbra,
  BeiGene), toripalimab (Loqtorzi, Junshi/Coherus), retifanlimab
  (Zynyz, Incyte) on the PD-1 side; atezolizumab (Tecentriq, Roche),
  durvalumab (Imfinzi, AstraZeneca), avelumab (Bavencio, Merck KGaA/
  Pfizer), cosibelimab (Unloxcyt, Checkpoint Therapeutics) on the
  PD-L1 side. Combinations with CTLA-4 (nivolumab + ipilimumab),
  LAG-3 (nivolumab + relatlimab = Opdualag), and VEGF/TKI partners
  dominate second-generation strategy.

  The class has transformed melanoma, non-small-cell lung cancer
  (NSCLC), renal cell carcinoma, head & neck squamous cell, urothelial,
  classical Hodgkin lymphoma, MSI-H / dMMR solid tumors, triple-
  negative breast cancer, cervical, endometrial, gastric, esophageal,
  and hepatocellular carcinoma. Keytruda alone reached ~$25B in 2023
  sales, displacing Humira as the top-selling pharmaceutical product
  globally. Keytruda's 2028 composition-patent cliff and an unusually
  crowded China-domestic pipeline define the class's next decade.

disease_overview_zh: |
  PD-1/PD-L1轴是现代免疫肿瘤学的主导治疗靶点。PD-1(PDCD1)是T
  细胞共抑制受体,其与配体PD-L1(CD274)和PD-L2(PDCD1LG2)的
  结合 — 常在肿瘤细胞和肿瘤浸润髓系细胞上过度表达 — 会抑制细胞
  毒性T细胞功能。抗体阻断该轴可恢复抗肿瘤免疫。本庶佑(京都
  大学)与James Allison(MD安德森)因免疫检查点生物学研究共同
  获得2018年诺贝尔奖;Allison的CTLA-4项目(ipilimumab,2011年)
  以及随后的抗PD-1浪潮(nivolumab与pembrolizumab,均2014年获批)
  确立了免疫检查点抑制作为肿瘤治疗的第四支柱 — 与手术、化疗、
  放疗并列。

  到2025年,该类药物已有13种以上获批抗体:PD-1方面包括
  pembrolizumab(Keytruda,默沙东)、nivolumab(Opdivo,BMS)、
  cemiplimab(Libtayo,Regeneron)、dostarlimab(Jemperli,GSK)、
  替雷利珠单抗(Tevimbra,百济神州)、特瑞普利单抗(Loqtorzi,
  君实生物/Coherus)、retifanlimab(Zynyz,Incyte);PD-L1方面包括
  atezolizumab(Tecentriq,罗氏)、durvalumab(Imfinzi,阿斯利康)、
  avelumab(Bavencio,默克雪兰诺/辉瑞)、cosibelimab(Unloxcyt,
  Checkpoint Therapeutics)。与CTLA-4(nivolumab+ipilimumab)、
  LAG-3(nivolumab+relatlimab = Opdualag)以及VEGF/TKI联合用药
  主导了第二代策略。

  该药物类别已经改变了黑色素瘤、非小细胞肺癌(NSCLC)、肾细胞
  癌、头颈鳞癌、尿路上皮癌、经典霍奇金淋巴瘤、MSI-H/dMMR实体瘤、
  三阴性乳腺癌、宫颈癌、子宫内膜癌、胃癌、食管癌及肝细胞癌的
  治疗格局。仅Keytruda一款药物在2023年销售额就达约250亿美元,
  超越Humira成为全球销售额第一的药品。Keytruda 2028年的组成物
  专利悬崖,加上异常拥挤的中国国产管线,定义了该类药物未来十
  年的竞争格局。

