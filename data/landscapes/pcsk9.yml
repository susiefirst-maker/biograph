lessons:
  - title: "Human-Genetics Loss-of-Function Derisking Sets the Gold Standard for Target Validation"
    title_zh: "人类遗传学功能丧失数据是靶点验证的金标准"
    lesson_type: scientific_mechanistic
    pattern: |
      When a target has a large human cohort of natural loss-of-
      function carriers who live longer, healthier lives — with
      lower disease incidence and no compensatory adverse
      phenotype — the target is pre-clinically derisked in a way
      that no animal model or in-vitro screen can match. PCSK9
      LOF carriers (Cohen 2005) had 28-47% lower LDL-C and 47-88%
      reduced CHD risk with no apparent health cost. That
      "living human knockout" data convinced five major pharmas
      (Amgen, Sanofi/Regeneron, Pfizer, Alnylam, Merck) to
      commit Phase 3 capital simultaneously 2010-2014. The
      pattern is repeating with LPA (Lp(a) LOF carriers ~80%
      lower CV risk; olpasiran / muvalaplin programs), GDF15,
      and ANGPTL4. Sponsors should prioritize targets with
      meaningful LOF-carrier datasets over those with only
      animal-model or mechanistic-hypothesis support.
    key_evidence:
      - "Cohen JC 2005 Nature Genetics: PCSK9 LOF carriers — 28% LDL-C reduction, 88% MI risk reduction lifetime"
      - "Kathiresan / Hobbs LOF / dbSNP analyses — extended to African-American, European cohorts"
      - "Five parallel PCSK9 Phase 3 programs committed 2010-2014 (Amgen, Sanofi/Regeneron, Pfizer, Alnylam, Merck) — unusually fast for a novel target"
      - "Parallel: LPA LOF carriers ~80% Lp(a) reduction + ~20% CV risk reduction → olpasiran / muvalaplin / zerlasiran programs 2022-2025"
    limitations:
      - "Requires large population-genetics databases — only available for cardiometabolic + a few hematologic + immunology targets"
      - "LOF-carrier phenotypes may have subtle adverse effects that emerge only in drug-induced knockdown (ligand-depletion kinetics differ)"
      - "Not all LOF-derisked targets pan out clinically — CETP LOF validated but anacetrapib + evacetrapib failed despite human genetics support"
    applicable_contexts:
      - "Cardiometabolic target prioritization"
      - "M&A target validation"
      - "Programs ingesting UK Biobank / FinnGen / large-cohort datasets"
    applicable_to_landscapes:
      - pcsk9
      - cardiometabolic
    human_reviewed: true
    reviewed_by: di

  - title: "Oral Small-Molecule Threats Reshape Injectable-Class Economics Before First Approval"
    title_zh: "口服小分子威胁在获批前就重塑注射类药物的经济模型"
    lesson_type: competitive_dynamics
    pattern: |
      In a class where all approved drugs are injectable (mAbs,
      siRNA), an oral small-molecule Phase 3 program reshapes
      competitor valuation and payer negotiation well before the
      molecule is approved. Payers assume the oral will arrive
      and demand concessions from incumbents accordingly;
      physicians factor the oral into long-term prescribing
      habits. Merck's MK-0616 Phase 2b readout (2023) and Phase 3
      initiation (CORALreef) already moved analyst forecasts for
      Repatha / Praluent / Leqvio downward even without Phase 3
      efficacy data. Same pattern visible in GLP-1 (orforglipron
      threatening injectable semaglutide), PCSK9 (MK-0616), and
      potentially BTK (orelabrutinib) and anti-viral antibodies.
      Injectable incumbents should plan for oral-entrant pricing
      pressure ~18-24 months ahead of actual oral approval.
    key_evidence:
      - "MK-0616 Phase 2b readout September 2023 → Repatha 2024 analyst consensus revised down ~15%"
      - "Orforglipron Phase 3 readouts 2024-2025 → injectable semaglutide / tirzepatide analyst forecasts adjusted for oral-cannibalization risk"
      - "Novartis Leqvio slower-than-consensus ramp partly attributed to MK-0616 overhang — payers delay adoption of twice-yearly injection when oral is plausible 2-3 years out"
      - "Historical precedent: Pradaxa / Xarelto / Eliquis displacement of injectable enoxaparin in DVT prophylaxis (2010-2014)"
    limitations:
      - "Requires the oral candidate to have plausible efficacy parity — low-efficacy oral doesn't threaten high-efficacy injectables"
      - "Complex biologics (ADCs, bispecifics) are structurally harder to make oral — pressure less asymmetric"
      - "Payer behavior varies — some markets (Japan, Germany) less responsive to oral-threat pre-approval"
    applicable_contexts:
      - "Injectable-biologic franchise planning in classes with oral pipeline"
