scientific_bottlenecks:
  - "Liver biopsy dependency for enrollment + endpoint — slows trials and limits patient access"
  - "No consensus non-invasive biomarker (FibroScan VCTE + ELF are the best surrogates; not regulatory-qualified as sole endpoints)"
  - "Endpoint heterogeneity: NASH resolution vs ≥1-stage fibrosis improvement differ in trial power + clinical meaning"
  - "High placebo response (~20–25%) driven by lifestyle counselling and histology reader variability"
  - "Disease heterogeneity: patients span insulin-resistant obese (GLP-1 responders) to lean NASH with distinct biology"

market_dynamics: |
  Projected $20–35B global NASH market by 2030 depending on uptake
  rate and label breadth. Resmetirom's 2024 approval (US list price
  ~$47,400/year) established first-mover pricing and is tracking
  toward ~$1B in 2025 sales per analyst consensus. Novo Nordisk's
  semaglutide franchise + Lilly's tirzepatide already generate
  significant off-label NASH prescribing via obesity indication,
  potentially blunting dedicated NASH-drug uptake. FGF21 and GLP-1
  combinations are the likely second-wave, with first readouts in
  2025-2026.

regulatory_context: |
  FDA 2018 NASH Guidance established the accelerated-approval
  pathway on histological surrogates (NASH resolution or ≥1-stage
  fibrosis improvement without worsening of the other). Full
  approval requires hard clinical outcomes (cirrhosis progression,
  liver-related death). Rezdiffra (March 2024) was the first
  accelerated-approval NASH therapy; its MAESTRO-NASH-OUTCOMES
  readout gates confirmatory approval. EMA has not yet endorsed the
  accelerated pathway. FDA obesity pharmacotherapy reimbursement
  precedent (Wegovy CV label, March 2024) may influence CMS stance
  on NASH drugs with metabolic mechanism.

