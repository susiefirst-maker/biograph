lessons:
  - title: "Platform-Durability Wins: 30-Year Peptide-Engineering Compound Interest Beats Fast-Follow"
    title_zh: "平台持久性制胜:30年的多肽工程复利战胜快速跟进"
    lesson_type: strategic_commercial
    pattern: |
      The dominant commercial positions in any hormone-replacement-
      style class accrue to sponsors willing to invest in platform
      capability over multiple product generations. Novo Nordisk's
      GLP-1 program ran 1993 → 2025 across liraglutide → semaglutide
      → oral semaglutide → CagriSema, compounding manufacturing,
      formulation, and regulatory know-how that new entrants cannot
      buy off-the-shelf. Eli Lilly's parallel 2010s investment in
      dual/triple agonism is producing the only credible
      next-generation challenge. Fast-followers (Pfizer, AstraZeneca
      on the legacy exenatide) ceded the high ground.
    key_evidence:
      - "Novo 1993 program start → 32-year compounding window before 2025 market leadership"
      - "Novo + Lilly combined $25B+ peptide manufacturing capex through 2029"
      - "Pfizer small-molecule program (danuglipron, lotiglipron) twice-failed without platform depth"
      - "AstraZeneca exenatide legacy loses share despite first-mover once-weekly (2012)"
    limitations:
      - "Applies to hormone/peptide classes; small-molecule kinase / GPCR classes are more fast-follower-friendly"
      - "Requires long-horizon capital — public-market pressure on quarterly results makes this hard to sustain"
      - "Disruption still possible via new modality (oral small-molecule, oral peptide, once-monthly); the lesson is about *generation-over-generation* persistence, not immunity"
    applicable_contexts:
      - "Entering any validated peptide hormone class as a new sponsor"
      - "Prioritization between fast-follow vs platform investment"
      - "Board / investor education on long-horizon R&D returns"
    applicable_to_landscapes:
      - glp1-obesity
      - peptide-therapeutics
    human_reviewed: true
    reviewed_by: di

  - title: "Outcome-Trial Reimbursement Arbitrage: Obesity → CV Label Unlocks Excluded Coverage Pools"
    title_zh: "结局试验的报销套利:肥胖 → 心血管标签打通被排除的报销通道"
    lesson_type: regulatory_pathway
    pattern: |
      When a regulatory-reimbursement dichotomy exists — one
      indication covered, another excluded — and a drug can
      credibly pursue both, the CVOT-driven label-route pays for
      itself many times over. The Medicare Part D obesity-drug
      exclusion structurally capped Wegovy's US market. Novo
      invested ~$1B+ in SELECT (17,000 patients, 4 years) to secure
      a 20% MACE reduction label; result is CV-indication coverage
      that sidesteps the exclusion. Lilly's SURMOUNT-MMO and
      Amgen's MariTide follow the template. Sponsors who short-cut
      the CVOT miss the reimbursement moat and compete on list
      price alone.
    key_evidence:
      - "Medicare Part D obesity exclusion statute (Social Security Act 1860D-2(e)(2)(A))"
      - "SELECT trial: 17,604 patients, ~$1B cost, HR 0.80 for MACE"
      - "FDA 2024-03-08 Wegovy CV risk reduction label"
      - "Parallel precedent: SGLT2 empagliflozin EMPA-REG 2015 → HF label / reimbursement"
    limitations:
      - "Requires drug class with plausible CV mechanism; fat-only mechanisms (e.g., lipase inhibitors) can't replicate"
      - "CVOT cost gate (~$500M-$1B) excludes small-cap sponsors without partnership"
      - "Payer response still variable post-label — Part D updated but commercial + state Medicaid lag"
    applicable_contexts:
      - "Obesity + cardiometabolic programs with CV hypothesis"
      - "Classes straddling excluded / covered indications"
    applicable_to_landscapes:
      - glp1-obesity
      - cardiometabolic
      - semaglutide
    human_reviewed: true
    reviewed_by: di
