    drug: onasemnogene abeparvovec
    sponsor: Novartis / AveXis
    phase: phase_3
    status: met_primary
    significance: "AAV9 SMN1 replacement in SMA type 1 infants 2019; ~90% survival at 2 years vs ~8% natural history; $2.25M per-infusion price set modern gene-therapy pricing precedent"
