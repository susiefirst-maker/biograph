# mRNA Therapeutics — curated T1 landscape.
#
# §7.4.6 priority #10. Thirteenth curated landscape. Modality class
# defined by the 2020-2021 COVID-19 vaccine success (Comirnaty +
# Spikevax), now navigating the post-pandemic demand collapse while
# expanding into RSV, flu, CMV, neoantigen oncology, and rare
# disease. Bridges to CRISPR (shared LNP delivery chemistry) and
# CAR-T (in-vivo reprogramming of circulating T-cells via mRNA +
# LNP).

