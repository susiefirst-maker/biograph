mesh_id: D002289    # Carcinoma, Non-Small-Cell Lung

disease_overview: |
  EGFR-mutant non-small-cell lung cancer (NSCLC) is the
  paradigmatic precision-oncology story. Activating mutations in
  the epidermal growth factor receptor (EGFR) kinase domain —
  predominantly exon 19 deletions and L858R point mutations, plus
  ~5-10% exon 20 insertions and rarer variants — occur in ~15-20%
  of Caucasian and ~40-50% of Asian lung adenocarcinoma. The
  discovery (Lynch, Paez, 2004 linking gefitinib responders to
  specific EGFR mutations) retroactively rescued a failed
  all-comer drug and launched targeted oncology as a discipline.

  The class has cycled through four TKI generations in twenty years,
  each one designed to overcome the prior generation's dominant
  resistance mechanism:
  (1) First-generation reversible inhibitors (gefitinib/Iressa,
      erlotinib/Tarceva, icotinib/Conmana) — active against
      sensitizing mutations but selected for T790M gatekeeper
      resistance in ~50-60% of progressors.
  (2) Second-generation irreversible pan-HER (afatinib, dacomitinib)
      — marginally better PFS but same T790M limitation; tolerability
      worse.
  (3) Third-generation T790M-selective covalent inhibitors
      (osimertinib, aumolertinib, lazertinib, furmonertinib) —
      active against both sensitizing mutations AND T790M; better
      CNS penetration; osimertinib moved to first-line in FLAURA
      (2017 → 2018 approval) and to adjuvant in ADAURA (2020).
      Tagrisso is now a ~$6B single molecule.
  (4) Fourth-generation C797S-selective inhibitors (developmental
      — BLU-945, WJ13404) target the dominant resistance mutation
      after 3rd-gen therapy.

  Parallel tracks: EGFR Exon 20 insertions (historically TKI-
  resistant) are now addressable with amivantamab (Rybrevant,
  EGFR/MET bispecific, J&J 2021) and sunvozertinib (Aiyansa, Dizal
  2023 China / 2024 US). Amivantamab + lazertinib combination
  (MARIPOSA, 2024) challenged osimertinib for front-line standard.
  Mobocertinib (Takeda) was withdrawn 2023 after PAPILLON head-to-
  head failure vs ami-chemo combination.

disease_overview_zh: |
  EGFR突变非小细胞肺癌(NSCLC)是精准肿瘤学的典范故事。表皮
  生长因子受体(EGFR)激酶结构域的激活突变 — 主要为外显子19
  缺失和L858R点突变,加上约5-10%的外显子20插入及罕见变异 —
  在约15-20%的白人和40-50%的亚洲肺腺癌患者中出现。2004年
  Lynch和Paez将吉非替尼应答者与特定EGFR突变联系起来的发现,
  追溯性地"拯救"了一个失败的全适应症药物,并开启了靶向肿瘤
  学作为一门学科。

  该药物类别在20年间经历了四代TKI更迭,每一代都针对上一代的
  主导耐药机制:
  (1)第一代可逆抑制剂(吉非替尼/Iressa、厄洛替尼/Tarceva、
  埃克替尼/Conmana) — 对敏感突变有效,但在约50-60%的进展
  患者中选择出T790M看门人耐药突变。
  (2)第二代不可逆泛HER(阿法替尼、达可替尼) — PFS略优,但
  T790M限制相同,耐受性更差。
  (3)第三代T790M选择性共价抑制剂(奥希替尼、阿美替尼、
  lazertinib、伏美替尼) — 对敏感突变及T790M均有效,中枢神经
  系统穿透性更好;奥希替尼在FLAURA试验(2017→2018获批)中
  进入一线,在ADAURA(2020)中进入辅助治疗。Tagrisso现已
  是单分子约60亿美元销售额。
  (4)第四代C797S选择性抑制剂(研发中 — BLU-945、WJ13404)
  针对三代治疗后的主导耐药突变。

  并行赛道:EGFR外显子20插入(历史上对TKI耐药)现可由
  amivantamab(Rybrevant,EGFR/MET双抗,强生2021)和舒沃替尼
  (Aiyansa,迪哲2023年中国/2024年美国)治疗。amivantamab +
  lazertinib联合方案(MARIPOSA,2024)挑战奥希替尼作为一线
  标准。Mobocertinib(武田)在PAPILLON头对头试验输给ami-化疗
  联合后于2023年撤市。

