mesh_id: D018719    # Receptor, ErbB-2

disease_overview: |
  HER2 (ERBB2) is a receptor tyrosine kinase amplified or overexpressed
  in ~15-20% of breast cancers, ~15-20% of gastric/GEJ adenocarcinomas,
  ~2-4% of NSCLC (mutation-driven), ~3-5% of colorectal (amplified),
  and subsets of urothelial, biliary, and salivary cancers. Dennis
  Slamon's 1987 paper linking HER2 amplification to aggressive breast
  cancer (and later to trastuzumab efficacy) is the canonical
  precision-oncology origin story; trastuzumab (Herceptin, Genentech
  / Roche) received FDA approval in 1998 — the first targeted therapy
  for a solid-tumor biomarker. The following 25 years produced a
  unique therapeutic cascade: naked monoclonal antibodies
  (trastuzumab, pertuzumab, margetuximab), antibody-drug conjugates
  (T-DM1, T-DXd, disitamab vedotin), and small-molecule kinase
  inhibitors (lapatinib, neratinib, tucatinib).

  The 2022 DESTINY-Breast04 readout fundamentally restructured the
  HER2 diagnostic category. Trastuzumab deruxtecan (T-DXd) showed
  activity in tumors historically considered "HER2-negative" — IHC
  1+ or IHC 2+/ISH-negative — establishing a new "HER2-low"
  category. DESTINY-Breast06 (2023) extended further to HER2-
  ultralow. By 2025 the HER2-addressable breast cancer population
  has roughly doubled. Tucatinib's brain-penetrant pharmacology
  (HER2CLIMB, 2020) addressed the ~30-50% of metastatic HER2+ BC
  patients who develop CNS metastases — a gap the antibody class
  couldn't cross. MOUNTAINEER (2022) and DESTINY-PanTumor02 (2024)
  carried HER2-targeted therapy beyond breast and gastric into
  colorectal, biliary, and tissue-agnostic approvals.

  Commercial concentration: the Roche Herceptin + Perjeta + Kadcyla
  franchise peaked at ~$11B/year before biosimilar erosion; Enhertu
  (Daiichi Sankyo / AstraZeneca) reached ~$3.8B in 2024 with
  trajectory to $10-12B peak. Biosimilar trastuzumab launched in
  2019+ and now represents majority of naked-antibody volume. The
  next frontier is HER2-low diagnostic reform and resistance
  mechanisms (HER3, PI3K, ER crosstalk).

disease_overview_zh: |
  HER2(ERBB2)是一种受体酪氨酸激酶,约15-20%的乳腺癌、15-20%的
  胃/胃食管结合部腺癌、2-4%的非小细胞肺癌(突变驱动)、3-5%的
  结直肠癌(扩增)以及部分尿路上皮癌、胆道癌和唾液腺癌中存在
  扩增或过表达。Dennis Slamon 1987年将HER2扩增与侵袭性乳腺癌
  (后与曲妥珠单抗疗效)联系起来的论文是精准肿瘤学的经典起源
  故事;曲妥珠单抗(Herceptin,Genentech/罗氏)于1998年获FDA
  批准 — 成为首个针对实体瘤生物标志物的靶向治疗药物。随后的
  25年催生了独特的治疗级联:裸单抗(曲妥珠单抗、帕妥珠单抗、
  margetuximab)、抗体偶联药物(T-DM1、T-DXd、disitamab vedotin)、
  以及小分子激酶抑制剂(lapatinib、neratinib、tucatinib)。

  2022年DESTINY-Breast04试验读出从根本上重构了HER2诊断分类。
  曲妥珠单抗德鲁替康(T-DXd)在历来被认为"HER2阴性"(IHC 1+
  或IHC 2+/ISH阴性)的肿瘤中显示出活性,由此确立了全新的
  "HER2低表达"类别。DESTINY-Breast06(2023)进一步延伸至
  HER2超低表达。到2025年,可治疗HER2的乳腺癌患者群体大约翻
  倍。Tucatinib的透脑药理学(HER2CLIMB,2020)解决了30-50%
  发生CNS转移的晚期HER2+乳腺癌患者的未满足需求 — 这是抗体类
  药物无法跨越的屏障。MOUNTAINEER(2022)和DESTINY-PanTumor02
  (2024)将HER2靶向治疗带出乳腺癌和胃癌,进入结直肠癌、胆
  道癌及不限肿瘤类型的适应症。

  商业集中度:罗氏的Herceptin + Perjeta + Kadcyla组合曾在生物
  类似药侵蚀前年峰值约110亿美元;Enhertu(第一三共/阿斯利康)
  2024年达到约38亿美元,轨迹指向100-120亿美元峰值。曲妥珠单
  抗生物类似药于2019年起陆续上市,目前占裸抗体用量的大多数。
  下一个前沿是HER2低表达诊断改革以及耐药机制(HER3、PI3K、
  雌激素受体交叉对话)。

