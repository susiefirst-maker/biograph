    # в”Җв”Җ Mechanism of action (augments Open Targets structured field) в”Җв”Җ
    # Open Targets populates the short form ("TNF-alpha inhibitor").
    # This curated version adds biological depth; loader merges it via
    # ADR-0007 precedence (curated > open_targets for narrative fields).
    mechanism_of_action: |
      Humira (adalimumab) is a fully human IgG1 monoclonal antibody that
      binds TNF-Оұ with high affinity (Kd ~0.1 nM) and neutralizes it by
      blocking interaction with the p55 (TNFR1) and p75 (TNFR2) cell-surface
      receptors. Neutralization prevents TNF-Оұ-driven activation of NF-ОәB
      and MAPK inflammatory cascades. Adalimumab also binds transmembrane
      TNF-Оұ on immune cells, triggering antibody-dependent cellular
      cytotoxicity (ADCC) and complement-dependent cytotoxicity (CDC) in
      some contexts, though primary clinical effect is cytokine neutralization.

