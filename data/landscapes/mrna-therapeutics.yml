failed_trials:
  - "CVnCoV (CureVac first-gen COVID mRNA, 2021) — 47% efficacy vs Pfizer/Moderna 95%; unmodified nucleoside design; program canceled, company absorbed by GSK 2024"
  - "MRT5005 (Translate Bio → Sanofi, 2022) — inhaled CFTR mRNA, insufficient protein expression; Sanofi discontinued rare-disease mRNA programs"
  - "mRNA-3704 methylmalonic acidemia (Moderna, 2022) — paused at Phase 1/2 on insufficient efficacy / LNP hepatic sequestration"
  - "mRNA-1273.214 bivalent (Moderna omicron) FDA scrutiny 2023 — not failed per se but exposed challenges of strain-matching regulatory cadence"

