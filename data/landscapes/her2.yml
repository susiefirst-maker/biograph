# HER2 — curated T1 landscape.
#
# §7.4.6 priority #8. Fifth curated landscape. Target-centric view
# crossing breast, gastric, NSCLC, CRC, and pan-tumor indications.
# High content overlap with ADC landscape — T-DXd, Kadcyla,
# disitamab vedotin, trastuzumab deruxtecan HER2-low story recycled.

