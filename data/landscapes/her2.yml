failed_trials:
  - "ALTTO (lapatinib + trastuzumab adjuvant BC, 2014) — Phase 3 missed primary; did not displace trastuzumab monotherapy in adjuvant"
  - "LUX-Breast 1 (afatinib HER2+ BC, 2016) — missed OS primary; effectively retired afatinib from HER2 breast development"
  - "KAITLIN (T-DM1 + pertuzumab vs T+P+taxane adjuvant, 2020) — missed IDFS primary; T-DM1 did not replace the taxane backbone in adjuvant"

