scientific_bottlenecks:
  - "Class-wide boxed warning (MACE + malignancy + thrombosis) affects all autoimmune JAK inhibitors — physician adoption capped as 2L+ behind TNF and IL-23 / IL-17 biologics"
  - "Cytokine pathway redundancy — blocking one JAK isoform doesn't always deliver biologic-class efficacy; combination with other cytokine inhibitors compromises safety"
  - "Thromboembolism signal — pulmonary embolism / DVT risk in autoimmune JAK trials; monitoring requirement adds prescribing overhead"
  - "Hematologic toxicity — anemia, neutropenia, lymphopenia common with pan-JAK; MF-restricted drugs engineered specifically for this (pacritinib, momelotinib better for anemia)"
  - "TYK2 selectivity is hard — the kinase domain is highly conserved with JAK1/2/3; allosteric JH2 binding (deucravacitinib) is a new MOA class not easily replicated"
  - "IL-23 / IL-17 biologic pricing + efficacy — Skyrizi (~$10B 2024), Tremfya, Cosentyx cover most psoriasis / IBD indications with cleaner safety; JAK positioning structurally second-line"

market_dynamics: |
  Global JAK inhibitor revenue reached ~$15 billion in 2023.
  Rinvoq (upadacitinib, AbbVie) leads at ~$5.9B 2023 (#4 in all
  biopharma); Xeljanz (tofacitinib, Pfizer) $1.7B declining
  post-boxed-warning; Jakafi (ruxolitinib, Incyte) $2.7B stable;
  Olumiant (baricitinib, Lilly) ~$1B; Sotyktu (deucravacitinib,
  BMS) ramped to $250M 2023 → ~$700M trajectory 2024-2025.
  Post-2021 boxed warning dynamics: autoimmune JAK share of new
  prescriptions in RA dropped ~30% in 2022; new indications
  (alopecia areata 2022, vitiligo 2021 topical, UC 2022, AD 2021,
  Crohn's 2023) partially backfilled via label expansion. AbbVie's
  post-Humira-cliff portfolio bet — Rinvoq + Skyrizi (IL-23) — is
  exceeding internal projections. Chinese JAK pipeline (Suzhou
  Zelgen jaktinib, Hansoh programs) has limited ex-China
  economics. Competitive pressure from GLP-1 class for adjacent
  inflammatory indications (obesity-related inflammation) is
  marginal so far.

regulatory_context: |
  FDA's September 2021 class-wide boxed warning for autoimmune
  JAK inhibitors (tofacitinib, baricitinib, upadacitinib) based
  on ORAL Surveillance is the class's defining regulatory event.
  The warning applies to MACE, malignancy, and thrombosis; MF-
  indication JAKs (ruxolitinib, fedratinib, pacritinib,
  momelotinib) are not covered because benefit-risk calculation
  differs in terminal hematologic disease. Filgotinib US rejection
  (2020) added male-reproductive toxicity to the class concerns.
  Deucravacitinib (TYK2 allosteric) launched 2022 without the
  boxed warning — mechanistically distinct and clean trial
  safety data. Ritlecitinib (JAK3 / TEC) 2023 also without boxed
  warning (more selective). TYK2 + JAK3-selective are the
  emerging non-boxed-warning subclasses. China NMPA approves
  JAK inhibitors on similar safety-monitoring framework but
  timing is typically lagged 2-4 years post-FDA.

