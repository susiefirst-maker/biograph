scientific_bottlenecks:
  - "HER2 IHC / ISH scoring heterogeneity — inter-reader agreement for IHC 1+ vs 0 is poor (κ ~0.4); HER2-low requires widespread lab retraining"
  - "Brain-metastasis penetration — trastuzumab and T-DM1 cross blood-brain barrier poorly; ~30-50% of metastatic HER2+ BC patients develop CNS mets where only tucatinib + T-DXd show activity"
  - "Resistance via HER3 / PI3K / ER crosstalk — most HER2+ tumors eventually progress; mechanistically heterogeneous escape routes not solved by any single agent"
  - "Cardiotoxicity — LVEF monitoring required across the class; concurrent anthracycline limitation still shapes neoadjuvant regimens"
  - "HER2-low diagnostic infrastructure — most labs don't routinely report IHC 1+; implementation gap is 2-5 years behind label expansion"
  - "T-DXd interstitial lung disease — ~10-15% any-grade ILD; dose-reduction / interruption algorithm adds management overhead"

market_dynamics: |
  Combined HER2-targeted global revenue crossed $20 billion in 2023
  (Herceptin franchise + biosimilars + Perjeta + Kadcyla + Enhertu +
  tucatinib + lapatinib/neratinib/pyrotinib + margetuximab). Biosimilar
  trastuzumab has absorbed ~70-80% of volume share in the US post-
  2019, pressing net price ~40-50% below branded. Enhertu reached
  ~$3.8B in 2024 — the fastest-growing HER2 asset — with analyst
  trajectory to $10-12B peak from HER2-low + HER2-ultralow + pan-
  tumor expansions. Roche's post-biosimilar strategy centers on
  Phesgo (subcutaneous P+T fixed-dose) + Kadcyla (adjuvant
  KATHERINE use) + next-generation programs. Chinese HER2 franchise
  (pyrotinib + disitamab vedotin + BNT323) is growing 25%+ YoY
  domestically; outbound-licensing wave mirrors the broader ADC
  pattern (DualityBio/BioNTech $1.5B). M&A activity concentrated
  in ADC sub-segment: Pfizer-Seagen 2023 ($43B) brought tucatinib.

regulatory_context: |
  HER2 was the first companion-diagnostic-defined solid-tumor
  biomarker (FDA 1998 trastuzumab approval included mandatory
  HER2 IHC testing). The 2022 HER2-low category (DESTINY-Breast04
  → FDA August 2022) was the biggest companion-diagnostic
  redefinition since the original: every HER2 IHC vendor had to
  re-validate, laboratories had to retrain. FDA guidance on HER2
  scoring updated 2023 with explicit HER2-low criteria. 2024
  DESTINY-PanTumor02 tissue-agnostic approval templated a path for
  HER2-directed therapy across rare tumors. ILD monitoring
  requirements mandatory for all deruxtecan-payload ADCs per 2023
  class labeling. Biosimilar pathway (351(k)) well-established;
  cross-indication extrapolation standard.

