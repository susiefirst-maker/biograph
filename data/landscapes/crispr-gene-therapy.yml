mesh_id: D015316    # Genetic Therapy

disease_overview: |
  Gene therapy delivers functional genetic material — either to
  replace a missing or malfunctioning gene (AAV + lentiviral
  vectors) or to edit an existing one (CRISPR-Cas9, base editors,
  prime editors) — for a durable or permanent therapeutic effect.
  The field has two parallel histories: (1) **AAV / lentiviral
  gene replacement** from the 1990s, validated clinically by the
  2017 FDA approval of Luxturna (Spark, voretigene, RPE65
  Leber congenital amaurosis) and scaled commercially by
  Novartis's 2019 Zolgensma (onasemnogene, SMN1 spinal muscular
  atrophy) at a $2.25M per-infusion price; and (2) **CRISPR-Cas9
  gene editing** from Jennifer Doudna + Emmanuelle Charpentier's
  2012-2013 work (2020 Nobel Prize), first clinically demonstrated
  in sickle cell disease in 2019 and commercially validated with
  the December 2023 FDA approval of Casgevy (exagamglogene
  autotemcel, Vertex + CRISPR Therapeutics, ~$2.2M price).

  By 2025 there are 10+ approved gene / cell-edited products:
  (1) **AAV-based in-vivo** — Luxturna (LCA), Zolgensma (SMA),
      Hemgenix + Beqvez (hemophilia B), Roctavian (hemophilia A),
      Elevidys (DMD), Kebilidi (AADC deficiency), Adstiladrin (NMIBC),
      Vyjuvek (EB topical).
  (2) **Ex-vivo CRISPR-Cas9 autologous** — Casgevy (SCD + TDT).
  (3) **Lentiviral ex-vivo** — Lyfgenia (bluebird SCD, parallel to
      Casgevy), Zynteglo (TDT), Skysona (CALD).
  (4) **Developmental in-vivo CRISPR** — Intellia NTLA-2001
      (transthyretin amyloidosis, Phase 3) uses LNP delivery to
      hepatocytes; Verve VERVE-102 (LDLR base-editing for familial
      hypercholesterolemia, post-VERVE-101 thrombocytopenia pause).
  (5) **Allogeneic gene-edited CAR-T** — bridges to CAR-T landscape
      via Caribou CB-010 (Cas12a), Allogene ALLO-501A, Poseida
      P-BCMA-ALLO1.
  (6) **Base + prime editing** — Beam Therapeutics, Prime Medicine,
      Verve (post-pivot) represent the next generation addressing
      CRISPR's double-strand break + imprecise-editing limitations.

  Operational reality as of 2025: Casgevy infusion count through
  Q4 2024 was fewer than 20 patients globally despite ~20,000
  eligible SCD patients in the US — driven by vein-to-vein time
  (7-12 weeks), myeloablative conditioning burden, $2.2M price +
  facility/monitoring costs adding ~$500k, and only ~60 certified
  centers worldwide. The manufacturing-personalization ceiling
  that limits autologous CAR-T (P7-D9 lesson) applies
  identically here. In-vivo CRISPR (NTLA-2001) and base editing
  (VERVE-102) are the next-frontier bets to escape the ceiling
  — LNP-delivered editing in situ avoids the ex-vivo
  manufacturing cycle entirely.

  Commercial structure is unique. One-shot $2M+ payment for
  durable / permanent cure creates payer-bankruptcy risk under
  traditional annual-budget reimbursement; outcomes-based
  installment contracts (Novartis for Zolgensma, Vertex for
  Casgevy) are the emerging model. The Medicare-CMS gene-therapy
  carve-out under IRA 2022 is still evolving. IP landscape:
  Broad Institute vs UC Berkeley CRISPR patent dispute (resolved
  Broad 2022 for cleavage in eukaryotic cells); Vertex-Editas
  license fee structure reflects the settlement.

disease_overview_zh: |
  基因治疗通过递送功能性遗传物质 — 或替换缺失/失能基因(AAV+
  慢病毒载体),或编辑现有基因(CRISPR-Cas9、碱基编辑、先导
  编辑)— 以实现持久或永久性治疗效果。该领域有两条平行历史:
  (1)从1990年代开始的**AAV/慢病毒基因替代**,在2017年FDA批准
  Luxturna(Spark的voretigene,RPE65 Leber先天性黑朦)获得
  临床验证,由诺华2019年以每次输注225万美元的价格批准的
  Zolgensma(onasemnogene,SMN1脊髓性肌萎缩症)实现商业化规模;
  以及(2)从Jennifer Doudna和Emmanuelle Charpentier 2012-2013
  年工作开始的**CRISPR-Cas9基因编辑**(2020年诺贝尔奖),于
  2019年在镰状细胞病中首次临床验证,并随着2023年12月FDA批准
  Casgevy(exagamglogene autotemcel,Vertex + CRISPR
  Therapeutics,约220万美元价格)实现商业化验证。

  截至2025年,已有10多个获批的基因/细胞编辑产品:
  (1)**基于AAV的体内**— Luxturna(LCA)、Zolgensma(SMA)、
  Hemgenix + Beqvez(B型血友病)、Roctavian(A型血友病)、
  Elevidys(DMD)、Kebilidi(AADC缺乏症)、Adstiladrin(NMIBC)、
  Vyjuvek(EB外用)。
  (2)**体外CRISPR-Cas9自体**— Casgevy(SCD + TDT)。
  (3)**慢病毒体外**— Lyfgenia(bluebird SCD,与Casgevy并行)、
  Zynteglo(TDT)、Skysona(CALD)。
  (4)**研发中体内CRISPR**— Intellia NTLA-2001(转甲状腺素
  蛋白淀粉样变,III期)使用LNP递送至肝细胞;Verve VERVE-102
  (LDLR碱基编辑治疗家族性高胆固醇血症,101号项目因血小板减少
  暂停后转型)。
  (5)**异体基因编辑CAR-T**— 通过Caribou CB-010(Cas12a)、
  Allogene ALLO-501A、Poseida P-BCMA-ALLO1桥接到CAR-T景观。
  (6)**碱基+先导编辑**— Beam Therapeutics、Prime Medicine、
  Verve(转型后)代表下一代技术,解决CRISPR的双链断裂和不精确
  编辑限制。

  2025年运营现实:截至2024年Q4,Casgevy全球输注患者数不足20名,
  尽管美国约有2万名合格SCD患者 — 原因是静脉到静脉时间(7-12
  周)、清髓性预处理负担、220万美元价格加上设施/监测成本增加
  约50万美元,以及全球仅约60个认证中心。P7-D9课程中约束自体
  CAR-T的生产个性化天花板在这里同样适用。体内CRISPR
  (NTLA-2001)和碱基编辑(VERVE-102)是下一个前沿赌注 —
  LNP递送的原位编辑完全避开了体外生产周期。

  商业结构独特。200万美元以上的一次性支付以实现持久/永久治愈
  在传统年度预算报销下造成付款方破产风险;基于结果的分期合同
  (诺和诺德的Zolgensma、Vertex的Casgevy)是新兴模式。IRA
  2022下的Medicare-CMS基因治疗例外规定仍在演变。知识产权格局:
  Broad Institute与UC Berkeley的CRISPR专利争议(2022年为真核
  细胞切割解决为Broad获胜);Vertex-Editas许可费结构反映该
  和解。

