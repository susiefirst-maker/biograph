scientific_bottlenecks:
  - "Post-pandemic COVID demand collapse — Comirnaty + Spikevax combined revenue dropped from ~$80B 2022 to ~$10-15B 2024; structural shift to annual flu-like uptake"
  - "LNP hepatic sequestration — first-gen LNPs concentrate in liver; extrahepatic tissues (CNS, lung, bone marrow) remain poorly accessible"
  - "Cold chain — original Comirnaty required -70°C storage; improved formulations at -20°C or 2-8°C but still stricter than traditional vaccines"
  - "IP overhang — Moderna settled major LNP disputes 2023 (Arbutus, Alnylam) at significant royalty rates; new programs must navigate the chemistry-patent landscape"
  - "Manufacturing cost vs traditional vaccines — mRNA COGS $5-10 per dose vs $1-2 for traditional subunit / live-attenuated; payer pressure post-pandemic"
  - "Individualized oncology mRNA — each patient's neoantigen vaccine requires tumor sequencing + custom manufacturing over 6-8 weeks; scale vs personalization tradeoff not solved"

market_dynamics: |
  mRNA therapeutics market peaked at ~$80 billion combined 2022
  (Comirnaty ~$56B, Spikevax ~$18B, others trivial) — the largest
  single-year commercial class event in pharma history. 2023-2024
  contraction to ~$10-15B reflects the structural shift to annual
  booster uptake and competition from updated bivalent / variant-
  matched formulations. Moderna market cap $180B peak 2021 →
  $18B 2024; BioNTech $120B peak → $25B 2024. Moderna mResvia
  2024 launch is the commercial test case for non-COVID platform
  value — first-quarter sales $15M well below Pfizer's Abrysvo
  RSV subunit $500M. mRNA-4157 KEYNOTE-942 Phase 3 readout
  2025-2026 is the single biggest mid-term inflection — positive
  result opens $5-10B oncology neoantigen category; negative
  result may narrow mRNA to respiratory vaccines only. Capstan
  acquisition (Pfizer 2024, $1B) and Orbital emergence are
  mRNA's bet on the CAR-T market via in-vivo reprogramming.
  Chinese mRNA cluster (Fosun via BioNTech Asian rights, CanSino,
  Walvax, Abogen) declined post-pandemic; limited domestic
  non-COVID programs of note.

regulatory_context: |
  FDA + EMA granted COVID mRNA emergency use / conditional
  approvals within 11 months of virus sequencing in 2020 — a
  pandemic-compressed pathway that is unlikely to repeat for
  non-emergency mRNA. Post-2022 mRNA regulatory pathway is
  conventional — mResvia 2024 approval used standard Phase 3
  efficacy + safety; mRNA-4157 accelerated approval route via
  KEYNOTE-942 OS data. The FDA has been receptive to mRNA as a
  platform but cautious about strain-matching cadence (2023
  mRNA-1273.214 bivalent omicron review raised questions about
  how frequently mRNA vaccines can be updated without full
  reapproval). Individualized neoantigen oncology mRNA requires
  FDA regulatory clarity on per-patient vs per-product
  approvals — open question for 2025 Phase 3 readouts. China
  NMPA approved Arcturus/CSL ARCT-154 (saRNA COVID) November
  2023; domestic mRNA regulatory framework less developed than
  US/EU.

