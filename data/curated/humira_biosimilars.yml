# Curated Humira biosimilars — 10 approved biosimilars.
#
# Each entry creates a Drug row with biosimilar_of_id pointing at the
# reference drug (adalimumab / CHEMBL1201580). Sources: FDA Purple Book,
# EMA biosimilar register, manufacturer press releases.
#
# brand_names are the common trade names; first is the most recognizable.
# generic_name uses FDA's "-suffix" convention for US biosimilars where
# assigned (adalimumab-adbm, -atto, etc.).

reference_chembl_id: CHEMBL1201580   # adalimumab (Humira)

biosimilars:
  - generic_name: adalimumab-atto
    brand_names: ["Amjevita", "Amgevita"]
    manufacturer: "Amgen"
    modality: antibody
    status: approved
    first_fda_approval: "2016-09-23"     # first FDA-approved Humira biosimilar
    us_launch: "2023-01-31"              # patent-settlement-delayed
    bla_number: "761024"
    notes: "First Humira biosimilar approved by FDA (2016) but launch blocked until 2023 by AbbVie patent settlement."

