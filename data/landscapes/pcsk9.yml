mesh_id: D000072363    # Proprotein Convertase 9

disease_overview: |
  PCSK9 is a serine protease secreted by hepatocytes that binds
  LDL receptors on the hepatocyte surface and redirects them to
  lysosomal degradation instead of recycling back to the cell
  membrane. PCSK9 inhibition upregulates LDL receptor density,
  accelerating LDL-cholesterol clearance from blood. The target
  was validated by human genetics well before drug development
  began: the 2005-2006 Cohen / Hobbs / Kathiresan papers showed
  carriers of PCSK9 loss-of-function alleles had markedly lower
  LDL-C and ~47-88% reduced cardiovascular event rates — with no
  apparent adverse phenotype. That genetic derisking is the
  canonical example of "human knockout" informing pharmacology
  ahead of trials.

  Clinical development converged on three modality tracks:
  (1) **Monoclonal antibodies** — evolocumab (Repatha, Amgen
      2015) and alirocumab (Praluent, Regeneron 2015). Biweekly
      or monthly subcutaneous injection. 50-60% LDL-C reduction
      on top of maximally-tolerated statins. CVOTs FOURIER (2017)
      and ODYSSEY OUTCOMES (2018) showed ~15% MACE reduction at
      ~2.5 years.
  (2) **Hepatocyte-targeted siRNA** — inclisiran (Leqvio,
      Novartis via 2019 Medicines Company acquisition $9.7B).
      Twice-yearly subcutaneous administration, ~50% LDL-C
      reduction. Approved EU 2020, US 2021. VICTORION CVOT
      readout expected 2026 will determine payer coverage
      expansion vs 1L statin adjunct positioning.
  (3) **Oral small-molecule** — Merck's MK-0616 (Phase 3, 2025
      readout expected). First oral PCSK9 inhibitor — a macrocyclic
      peptide administered once daily. If successful, would
      displace injectable mAbs for primary-prevention patients
      who refuse self-injection. Parallel to orforglipron (oral
      GLP-1) threatening injectable semaglutide in obesity.

  Chinese-originator wave 2023-2024: ongericimab (Junshi),
  tafolecimab (Innovent), recaticimab (Hengrui) all achieved
  NMPA approval within 18 months of each other at 40-60% price
  discount to Repatha/Praluent. Familial hypercholesterolemia
  (FH) remains a narrow anchor indication (~$500M global);
  broader secondary-prevention reimbursement unlocked 2017-2020
  post-CVOTs.

disease_overview_zh: |
  PCSK9是一种由肝细胞分泌的丝氨酸蛋白酶,结合肝细胞表面的
  LDL受体并引导其进入溶酶体降解,而非返回细胞膜再利用。
  抑制PCSK9可上调LDL受体密度,加速血中LDL胆固醇的清除。
  该靶点早在药物开发前就已通过人类遗传学得到验证:2005-2006
  年Cohen / Hobbs / Kathiresan团队的论文显示PCSK9功能丧失
  突变的携带者LDL-C明显降低,心血管事件发生率降低约47-88%,
  且无明显不良表型。这一遗传学风险降低是"人类基因敲除"指导
  药物开发的经典范例。

  临床开发汇聚为三条模态赛道:
  (1)**单克隆抗体** — 依洛尤单抗(Repatha,安进2015)和
  阿利珠单抗(Praluent,Regeneron 2015)。每两周或每月一次
  皮下注射。在最大耐受剂量他汀基础上再降低LDL-C约50-60%。
  FOURIER(2017)和ODYSSEY OUTCOMES(2018)两项CVOT试验在
  约2.5年随访中显示MACE降低约15%。
  (2)**肝细胞靶向siRNA** — Inclisiran(Leqvio,诺华通过
  2019年97亿美元收购Medicines Company获得)。每年两次皮下
  注射,LDL-C降低约50%。2020年欧盟、2021年美国获批。
  VICTORION CVOT预计2026年读出,将决定付款方覆盖扩展
  vs 他汀辅助一线定位。
  (3)**口服小分子** — 默沙东MK-0616(III期,2025读出)。
  首个口服PCSK9抑制剂 — 每日一次给药的大环肽。若成功,将
  使拒绝自我注射的一级预防患者不再需要注射剂。与口服GLP-1
  orforglipron威胁可注射司美格鲁肽在肥胖领域的动态类似。

  2023-2024年中国原研浪潮:君实生物的ongericimab、信达的
  tafolecimab、恒瑞的recaticimab在18个月内相继获NMPA批准,
  较Repatha/Praluent定价低40-60%。家族性高胆固醇血症(FH)
  仍为狭窄的锚定适应症(全球约5亿美元);2017-2020年CVOT后
  更广泛的二级预防报销得以打通。

