scientific_bottlenecks:
  - "Pricing friction vs statin-only baseline — evolocumab ~$5,850/yr, alirocumab ~$5,850/yr, inclisiran ~$9,000-14,000/yr; payer prior-authorization heavy vs <$100/yr generic atorvastatin"
  - "Statin-intolerance niche is narrow — ~5-10% of statin users; most PCSK9 uptake is statin-adjunct in high-risk secondary-prevention"
  - "CVOT duration — FOURIER 2.2 yr, ODYSSEY 2.8 yr; primary-prevention CVOTs (VICTORION-1PREVENT) require 5+ years at scale"
  - "Oral small-molecule threat to injectable incumbents — MK-0616 2025 readout could displace significant Repatha / Praluent / Leqvio share if positive"
  - "Lp(a) as adjacent target — olpasiran, muvalaplin, zerlasiran in Phase 2/3 for Lp(a)-driven CV risk; Pocket-bite on PCSK9 TAM"
  - "Primary-prevention reimbursement — SELECT trial precedent (Wegovy CV risk reduction 2024) raises expectations that PCSK9 should match; primary-prevention payer gates still incomplete"

market_dynamics: |
  Global PCSK9 inhibitor market crossed $4 billion in 2023 with
  Repatha ~$1.8B, Praluent ~$500M, Leqvio ~$470M. Class growth
  ~20% YoY driven by inclisiran ramp + Chinese originator launches
  at 40-60% domestic price discount. Novartis's 2019 $9.7B
  Medicines Company acquisition remains the defining M&A event —
  priced the dosing-convenience moat (twice-yearly vs monthly)
  and the Alnylam GalNAc platform; analyst consensus projected
  Leqvio peak ~$2B but actual ramp has lagged due to payer prior-
  authorization persistence. Merck's MK-0616 Phase 3 2025 readout
  is the next major inflection — oral vs injectable is the GLP-1
  orforglipron-equivalent analog. Chinese ongericimab +
  tafolecimab + recaticimab 2023-2024 launches pressure global
  pricing via reference-price arbitrage. Lp(a) class emergence
  (olpasiran Phase 3 Amgen, muvalaplin Phase 2 Lilly, zerlasiran
  Phase 2 Silence Therapeutics) will bifurcate the lipid-CV
  market post-2026.

regulatory_context: |
  FDA PCSK9 approvals (evolocumab + alirocumab 2015) used initial
  LDL-C surrogate endpoint; 2017-2018 CVOT readouts (FOURIER,
  ODYSSEY) unlocked broader CV-outcome indication expansion. FDA
  2018 homozygous FH pediatric approvals extended eligibility.
  Inclisiran 2021 approval used LDL-C surrogate with post-
  marketing CVOT requirement (VICTORION-2P). SELECT trial 2023
  (semaglutide CV risk reduction, separate mechanism) raised bar
  for CV outcome as preferred reimbursement unlock — Novartis
  VICTORION-2P needs to deliver to match SELECT-level access.
  China NMPA has approved all three Chinese-originator PCSK9
  mAbs 2023-2024 under parallel fast-track for cardiometabolic
  innovation. EMA approved inclisiran first 2020 (before US)
  due to less restrictive reimbursement framework. Merck's
  MK-0616 oral Phase 3 CORALreef program 2025 readout will use
  LDL-C surrogate primary with CVOT follow-up — new precedent
  for oral small-molecule approval in a historically injectable
  class.

