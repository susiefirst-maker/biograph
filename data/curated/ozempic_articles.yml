        source_name: "FDA"
        source_type: press_release
        language: en
        publish_date: "2017-12-05"
        credibility_tier: tier_1_primary
        url: "https://www.fda.gov/drugs/resources-information-approved-drugs/ozempic-semaglutide-injection"
