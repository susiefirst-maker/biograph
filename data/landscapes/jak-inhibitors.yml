mesh_id: D000074969    # Janus Kinase Inhibitors

disease_overview: |
  The JAK (Janus kinase) family — JAK1, JAK2, JAK3, and the related
  TYK2 — transduces intracellular signaling for type-I/II cytokine
  receptors (interleukins, interferons, growth factors). Pan-JAK
  inhibition was clinically validated in 2011 with Incyte's
  ruxolitinib (Jakafi) for myelofibrosis — a disease driven by
  JAK2 V617F activating mutations. The class rapidly expanded into
  autoimmune / inflammatory disease on the premise that oral
  small-molecule disruption of Th1/Th17/Treg cytokine signaling
  could match biologic efficacy at lower cost: tofacitinib
  (Xeljanz, Pfizer, 2012) for rheumatoid arthritis was the first
  derivatization, followed by baricitinib (Olumiant, Lilly 2018)
  and upadacitinib (Rinvoq, AbbVie 2019). Indications expanded
  across the 2019-2024 window to psoriatic arthritis, ankylosing
  spondylitis, ulcerative colitis, Crohn's disease, atopic
  dermatitis, alopecia areata, vitiligo, and (for baricitinib)
  severe COVID-19 during the pandemic.

  2021 was the class's inflection year. Pfizer's ORAL Surveillance
  post-marketing trial — tofacitinib vs TNF inhibitor in RA
  patients aged ≥50 with cardiovascular risk factors — showed
  increased rates of major adverse cardiovascular events (MACE)
  and malignancies with tofacitinib. FDA issued a September 2021
  class-wide boxed warning covering tofacitinib, baricitinib, and
  upadacitinib (but not MF-restricted drugs ruxolitinib and
  fedratinib, where benefit-risk differs). The warning structurally
  repositioned the class behind TNF / IL-23 / IL-17 biologics as
  a second- or later-line option in RA and PsA, limiting label
  expansion potential even as new indications (alopecia areata,
  vitiligo, UC, Crohn's, AD) kept arriving.

  Second-generation escape: BMS's deucravacitinib (Sotyktu, 2022)
  uses allosteric TYK2 binding rather than competitive JAK ATP-site
  binding — mechanistically distinct class with (so far) a cleaner
  safety profile and no boxed warning. TYK2-selective follow-ons
  are the most-watched developmental programs for derm and
  rheumatology. AbbVie's Rinvoq (upadacitinib) is the class's
  commercial success story despite the warning — ~$5.9B 2023 on
  the strength of 6+ indication labels, functioning as the
  cornerstone of AbbVie's post-Humira portfolio.

disease_overview_zh: |
  JAK(Janus激酶)家族 — JAK1、JAK2、JAK3以及相关的TYK2 — 负责
  I型/II型细胞因子受体(白介素、干扰素、生长因子)的胞内信号
  传导。泛JAK抑制于2011年由Incyte的芦可替尼(Jakafi)治疗骨髓
  纤维化获得临床验证 — 这是一种由JAK2 V617F激活突变驱动的
  疾病。该类别迅速扩展至自身免疫/炎症领域,前提是口服小分子
  阻断Th1/Th17/Treg细胞因子信号可能以更低成本达到生物制剂
  的疗效:辉瑞的托法替布(Xeljanz,2012)用于类风湿关节炎是
  首个衍生应用,随后是礼来的巴瑞替尼(Olumiant,2018)和艾伯
  维的乌帕替尼(Rinvoq,2019)。2019-2024年间适应症进一步扩
  展至银屑病关节炎、强直性脊柱炎、溃疡性结肠炎、克罗恩病、
  特应性皮炎、斑秃、白癜风,以及巴瑞替尼用于重症新冠。

  2021年是该类别的拐点年。辉瑞的ORAL Surveillance上市后试验 —
  在具有心血管危险因素的≥50岁类风湿关节炎患者中比较托法替布
  与TNF抑制剂 — 显示托法替布组主要不良心血管事件(MACE)及
  恶性肿瘤发生率增加。FDA于2021年9月对托法替布、巴瑞替尼和
  乌帕替尼发布了类别范围黑框警告(但不涵盖骨髓纤维化限定的
  芦可替尼和fedratinib,因为其风险收益评估不同)。该警告结构
  性地将该类别重新定位为类风湿关节炎和银屑病关节炎中TNF、
  IL-23、IL-17生物制剂之后的二线或更后线选择,限制了标签扩展
  潜力,即便新适应症(斑秃、白癜风、UC、克罗恩病、AD)不断
  到来。

  第二代突围:BMS的deucravacitinib(Sotyktu,2022)使用别构
  TYK2结合而非经典JAK ATP位点竞争结合 — 机制不同的类别,
  (目前)具有更清晰的安全性,无黑框警告。TYK2选择性后续分子
  是皮肤科和风湿领域最受关注的研发项目。艾伯维的Rinvoq
  (乌帕替尼)是该类别尽管有警告但商业上成功的代表 — 2023年
  销售额约59亿美元,得益于6个以上适应症标签,成为艾伯维
  Humira后组合的基石。

