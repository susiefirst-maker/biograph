# PCSK9 — curated T1 landscape.
#
# §7.4.6 priority #14. Twelfth curated landscape. Cardiometabolic
# lipid-lowering target. Notable as the cleanest example of
# human-genetics-driven drug development: 2005 Cohen / Hobbs /
# Kathiresan work on PCSK9 loss-of-function carriers (low LDL,
# low CV risk, no obvious disease phenotype) derisked the entire
# class before Phase 1. Adjacent to Obesity-beyond-GLP1 via the
# CV-outcome reimbursement pathway (SELECT trial precedent).

