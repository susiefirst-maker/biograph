# KRAS — curated T1 landscape.
#
# §7.4.6 priority #13. Eighth curated landscape. The "undruggable
# → druggable" narrative: 40 years of saying you can't drug KRAS,
# then Shokat's 2013 switch-II-pocket discovery and a 2021 first
# approval. Currently in the "sobering second-act": narrow G12C
# success, broader pan-RAS bet still in progress.

