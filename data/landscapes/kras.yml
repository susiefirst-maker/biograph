scientific_bottlenecks:
  - "Acquired resistance within 6-9 months — secondary KRAS mutations (Y96D, Y96C), RTK reactivation (MET, EGFR amplification), MAPK pathway re-activation, mesenchymal transition; no durable monotherapy"
  - "G12C is only ~13% of KRAS mutations — G12D (30%), G12V (25%), G13D (9%) are structurally distinct and require separate drug chemistry; current G12C molecules do not cross-cover"
  - "Tumor-type-dependent efficacy — G12C NSCLC ORR ~40%; G12C CRC monotherapy ORR <10% (needs anti-EGFR combo); mechanism of tissue selectivity unclear"
  - "Pan-RAS therapeutic window — Revolution Medicines RMC-6236 inhibits wild-type RAS too; toxicity management is the central open question for the program"
  - "Combination toxicity — KRAS + MEK combinations cause hyperactivation skin toxicity; KRAS + IO combinations cause hepatitis (CodeBreaK 301); safe combination partners limited"
  - "Pancreatic cancer penetration — KRAS G12D is ~44% of pancreatic adenocarcinoma; MRTX1133 + RMC-9805 activity still unproven; stromal barrier limits drug delivery"

market_dynamics: |
  Global KRAS G12C inhibitor market reached ~$300-400 million in
  2023 — well below 2021 launch-era projections of $1B+ for
  sotorasib alone. The commercial shortfall is partly clinical
  (CodeBreaK 200 OS miss) and partly structural (G12C is only
  ~13% of KRAS mutations). BMS's $5.8B Mirati acquisition
  (November 2023) was priced as a platform bet — Krazati standalone
  economics don't justify the multiple; the portfolio
  (MRTX1133 G12D + adagrasib combinations + Mirati's broader MAPK
  pipeline) drove the valuation. Revolution Medicines' RMC-6236
  is the next major inflection — Phase 3 pancreatic + NSCLC
  readouts 2025-2026 will determine whether pan-RAS inhibitors
  reach the $2-5B peak analyst consensus projects. Chinese KRAS
  cluster (Jacobio glecirasib 2024 approval, Hengrui HRS-4642,
  InventisBio garsorasib) is growing but has minimal ex-China
  economics so far. 2025 CodeBreaK 300 + KRYSTAL-10 CRC combo
  approvals opened the second indication; CRC KRAS G12C TAM
  ~$1-2B globally.

regulatory_context: |
  FDA used accelerated approval for both initial KRAS G12C
  launches (sotorasib 2021 single-arm CodeBreaK 100, adagrasib
  2022 single-arm KRYSTAL-1). Post-CodeBreaK 200's 2023 OS miss,
  FDA signaled heightened scrutiny for accelerated-approval KRAS
  programs — required confirmatory trials must now read OS
  convincingly, not just PFS. Label language for sotorasib was
  tightened 2024 to reinforce 2L NSCLC indication boundaries.
  China NMPA approved glecirasib (Jacobio) 2024 under its fast-
  track for domestic innovation. The EMA has been more conservative
  — sotorasib conditional approval only, full approval pending
  CodeBreaK 200 data package resolution. CRC combination approvals
  (CodeBreaK 300, KRYSTAL-10) in 2024-2025 used conventional full
  approval pathway based on PFS superiority over active comparator.

