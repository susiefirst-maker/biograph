lessons:
  - title: "Structural-Biology Breakthroughs Reset 40-Year Undruggable Labels — But Commercial Reality Lags Scientific Excitement"
    title_zh: "结构生物学突破打破40年不可成药的标签 — 但商业现实滞后于科学兴奋"
    lesson_type: scientific_mechanistic
    pattern: |
      When a validated target is labeled "undruggable" for decades,
      a structural-biology discovery that reveals a cryptic binding
      site can open the target within a few years (Shokat's 2013
      KRAS G12C switch-II pocket → Lumakras 2021). But first-
      generation drugs in these "reopened" classes frequently
      disappoint commercially because (a) they typically address
      a narrow mutation subset, not the full target, and (b)
      acquired-resistance mechanisms emerge within months. The
      commercial winners are pan-target second-generation
      molecules or combination regimens that address the broader
      mutation landscape — not the pioneering molecules. Same
      story played out with BCL-2 (navitoclax → venetoclax
      selective), CDK4/6 (palbociclib → ribociclib / abemaciclib
      differentiation), and now KRAS (sotorasib/adagrasib narrow
      G12C → RMC-6236 pan-RAS ambition).
    key_evidence:
      - "Shokat 2013 Nature KRAS switch-II discovery → Lumakras 2021 FDA = 8 year target-to-drug cycle (fast by oncology standards)"
      - "Sotorasib 2023 revenue ~$200M vs 2021 launch-era $1B+ projections; shortfall driven by narrow G12C subset (~13% of KRAS) + CodeBreaK 200 OS miss"
      - "BMS paid $5.8B for Mirati = platform valuation, not Krazati-standalone valuation"
      - "Revolution Medicines RMC-6236 pan-RAS Phase 3 — analyst consensus $2-5B peak if TAM expansion works"
    limitations:
      - "Applies specifically to mutation-narrow oncology targets with structural-biology limits; doesn't generalize to all 'undruggable' classes"
      - "Time from breakthrough to commercial maturation is 10-15 years; sponsors need long-horizon capital"
      - "Narrow-first-generation economics can still be solid ($200-500M molecule) even when they miss blockbuster expectations"
    applicable_contexts:
      - "KRAS, TP53, MYC, MCL-1 — undruggable class reopening candidates"
      - "Early-stage M&A valuation of pioneering molecules in reopened classes"
      - "Pan-target vs narrow-selective strategic decisions in kinase inhibitor classes"
    applicable_to_landscapes:
      - kras
      - oncology-biomarkers
    human_reviewed: true
    reviewed_by: di

  - title: "PFS-Met-OS-Missed Outcomes Are Survivable But Permanent Label Anchors"
    title_zh: "PFS达标但OS未达的结果虽可生存但会永久锚定标签"
    lesson_type: regulatory_pathway
    pattern: |
      When a confirmatory Phase 3 meets PFS but misses OS, FDA
      increasingly keeps accelerated approval but tightens label
      language, restricts expansion into earlier lines, and
      signals heightened scrutiny for future programs in the same
      class. The CodeBreaK 200 2023 readout for sotorasib is the
      canonical recent case: PFS HR 0.66 (met), OS HR 1.01
      (missed). FDA kept approval but restricted 1L expansion
      ambitions and required additional post-marketing data.
      Adagrasib's KRYSTAL-12 in 2024 met both PFS and OS,
      avoiding this trap — which now creates a permanent competitive
      asymmetry between the two G12C molecules even though they
      are clinically similar. Sponsors should plan for OS-convincing
      confirmatory designs, not PFS-sufficient ones, when moving
      into class-wide tight regulatory posture.
    key_evidence:
      - "CodeBreaK 200 2023: sotorasib PFS HR 0.66 met, OS HR 1.01 missed; FDA kept approval with tightened label"
      - "KRYSTAL-12 2024: adagrasib PFS HR 0.58 + OS HR 0.81 — saved program from CodeBreaK-200-style trap"
      - "FDA Project ODAC 2021 raised confirmatory-data bar — OS-convincing now the working standard for accelerated-approval confirmation"
      - "Precedent in other accelerated approvals: hepatocellular carcinoma IO withdrawals 2021-2023; triple-negative atezolizumab 2021 withdrawal"
    limitations:
      - "Applies to confirmatory Phase 3 in crowded classes; single-arm accelerated approvals with no comparator face different dynamics"
      - "OS-missed-PFS-met doesn't always trigger withdrawal — depends on magnitude, pre-specified hypothesis, confounding crossover"
      - "Post-marketing data from real-world use can rehabilitate label — not a terminal outcome"
    applicable_contexts:
      - "Phase 3 confirmatory design in accelerated-approval drugs"
      - "Regulatory-strategy planning for KRAS, IO, ADC programs"
      - "Head-to-head vs real-world-evidence tradeoff analysis"
    applicable_to_landscapes:
      - kras
      - pd1-pdl1
      - oncology-regulatory
    human_reviewed: true
    reviewed_by: di

  - title: "Chinese-Originator Parallel Programs Are Now the Default, Not the Exception"
    title_zh: "中国原研并行项目现已成为默认模式而非例外"
    lesson_type: competitive_dynamics
    pattern: |
      Every validated oncology target since 2020 has multiple
      Chinese-originator programs approved or in Phase 3 at close
      parallel timing to the Western first-mover. KRAS G12C:
      Jacobio (glecirasib, NMPA 2024), InventisBio (garsorasib,
      Phase 3), Hengrui (HRS-4642, G12D). PD-1: tislelizumab,
      toripalimab, sintilimab. ADC: DualityBio, RemeGen,
      Innovent. EGFR NSCLC: Hansoh aumolertinib, Allist
      furmonertinib, Dizal sunvozertinib. The competitive
      implication: Western sponsors can no longer plan on a
      5-year first-mover window; Chinese molecules reach Phase 3
      within 2-3 years of Western approval at 30-60% list-price
      discount, pressuring ex-China pricing through payer
      negotiation and driving outbound-licensing deal structures.
      This is now the dominant oncology competitive dynamic, not
      a novelty.
    key_evidence:
      - "Glecirasib (Jacobio) NMPA approval August 2024, ~3 years after sotorasib US 2021"
      - "Garsorasib (InventisBio) Phase 3 2024 NSCLC"
