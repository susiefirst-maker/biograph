scientific_bottlenecks:
  - "Sarcopenia during rapid weight loss — 30-40% of GLP-1 weight loss is lean mass; myostatin inhibitors (bimagrumab, trevogrumab) aim to address but introduce vascular / immune side effects"
  - "Post-discontinuation weight regain — STEP-4 showed ~2/3 regain within one year off semaglutide; no mechanism in development demonstrates durable effect post-withdrawal"
  - "CB1R peripheral-selectivity design — rimonabant 2008 failure defined the class safety bar; monlunabant + nimacimab Phase 2 data suggest design succeeded but long-term psychiatric surveillance still required"
  - "Triple agonist therapeutic window — retatrutide adds glucagon; glucagon activates hepatic gluconeogenesis and fat oxidation but narrow margin vs hyperglycemia"
  - "Head-to-head against tirzepatide (~22.5% Wegovy benchmark) — any new mechanism must clear this bar or demonstrate muscle-preservation / oral-convenience / post-CV advantage"
  - "Combination complexity for payer coverage — amylin + GLP-1 combinations require separate J-codes; reimbursement mechanics still evolving"

market_dynamics: |
  Global obesity pharmacotherapy market crossed $30 billion in
  2023 (GLP-1 dominant). "Beyond-GLP-1" segment projected
  $20-30B by 2030 per analyst consensus — growing as GLP-1
  ceiling effects drive demand for combinations. Lilly-Versanis
  $1.925B July 2023 acquisition was the landmark M&A event;
  Novo-Inversago 2023 ($1.1B) added CB1R. Rhythm setmelanotide
  (Imcivree) at ~$150M reflects the narrow genetic-obesity TAM
  — high unit price but small population. Retatrutide Phase 3
  readouts 2025-2026 likely drive the next valuation inflection.
  Oral small-molecule GLP-1 (orforglipron Phase 3 2025) introduces
  a parallel lower-cost tier. Chinese beyond-GLP-1 pipeline
  concentrated at Innovent (ecnoglutide) + earlier-stage multi-
  agonists; outbound-licensing nascent vs ADC / bispecific
  patterns.

regulatory_context: |
  FDA March 2024 Wegovy CV-risk-reduction label (SELECT trial)
  elevated cardiovascular outcome as the preferred
  reimbursement-expansion pathway for obesity drugs. Beyond-GLP-1
  sponsors face pressure to include CVOT components in pivotal
  programs to match SELECT-level reimbursement unlock. Rimonabant
  2008 withdrawal still shapes CB1R class surveillance — FDA
  requires dedicated psychiatric monitoring even for peripheral-
  restricted designs. Myostatin class benefits from historical
  ACE-031 caution — bimagrumab program includes rigorous
  vascular safety monitoring. Combination approvals face J-code
  + reimbursement complexity beyond monotherapy. Chinese NMPA
  operates parallel fast-track for domestic Novo + Innovent
  obesity programs.

