mesh_id: D000074324    # Receptors, Chimeric Antigen

disease_overview: |
  Chimeric antigen receptor (CAR) T-cell therapy reprograms a
  patient's own T-cells ex vivo to recognize and kill tumor cells
  expressing a chosen surface antigen. The approach originated at
  Memorial Sloan Kettering (Michel Sadelain) and UPenn (Carl June)
  across the 2000s-2010s; the watershed was a 2011 NEJM case
  report of sustained complete remission in chronic lymphocytic
  leukemia after anti-CD19 CAR-T. Novartis's tisagenlecleucel
  (Kymriah) became the first FDA-approved cell therapy in August
  2017 for pediatric relapsed/refractory B-ALL, followed within
  weeks by Kite's axicabtagene ciloleucel (Yescarta) in diffuse
  large B-cell lymphoma.

  By 2025 seven autologous CAR-T products are FDA-approved: five
  targeting CD19 (Kymriah, Yescarta, Tecartus, Breyanzi, Aucatzyl)
  and two targeting BCMA (Abecma, Carvykti). Indications span
  B-ALL, diffuse large B-cell lymphoma, mantle cell lymphoma, CLL,
  follicular lymphoma, and multiple myeloma. Cilta-cel (Carvykti,
  Legend / J&J) is the fastest-ramping with ~$1B trajectory in
  2024 driven by CARTITUDE-4 (2L MM) approval. Second-generation
  autologous constructs are iterating on scFv affinity, co-
  stimulatory domains (4-1BB vs CD28), vector backbone (lentiviral
  vs retroviral), and manufacturing turnaround.

  The defining operational challenge remains vein-to-vein time
  (3-6 weeks from apheresis to infusion), manufacturing failure
  rate (~5-10%), and a $400-500k list price per infusion that only
  ~150 certified centers globally can administer. The FDA's January
  2024 class-wide boxed warning for secondary T-cell malignancies
  (T-NHL / T-ALL cases post-CAR-T) reframed the benefit-risk
  calculation and triggered 15-year patient registries. Allogeneic
  ("off-the-shelf") CAR-T programs (Allogene ALLO-501, Caribou
  Biosciences, Poseida) are the next frontier but remain
  commercially unproven — durability lags autologous in published
  data as of 2025.

disease_overview_zh: |
  嵌合抗原受体(CAR)T细胞治疗将患者自身的T细胞在体外重新编程,
  使其识别并杀伤表达特定表面抗原的肿瘤细胞。该方法由Memorial
  Sloan Kettering的Michel Sadelain以及UPenn的Carl June在2000-
  2010年代开创;分水岭是2011年《新英格兰医学杂志》发表的抗CD19
  CAR-T治疗慢性淋巴细胞白血病实现持续完全缓解的病例报告。2017
  年8月,诺华的替沙仑赛(Kymriah)成为FDA批准的首个细胞治疗,
  用于儿童复发/难治B-ALL;Kite的阿基仑赛(Yescarta)随后数周
  内获批,用于弥漫大B细胞淋巴瘤。

  到2025年,FDA已批准7款自体CAR-T产品:五款靶向CD19
  (Kymriah、Yescarta、Tecartus、Breyanzi、Aucatzyl),两款靶
  向BCMA(Abecma、Carvykti)。适应症涵盖B-ALL、弥漫大B细胞
  淋巴瘤、套细胞淋巴瘤、CLL、滤泡性淋巴瘤和多发性骨髓瘤。
  Cilta-cel(Carvykti,传奇生物/强生)增长最快,2024年销售
  轨迹约10亿美元,由CARTITUDE-4(二线MM)获批驱动。第二代自
  体构建在scFv亲和力、共刺激结构域(4-1BB与CD28)、载体骨架
  (慢病毒vs逆转录病毒)以及生产周转方面持续迭代。

  决定性的运营挑战仍是"静脉到静脉"时间(采集至回输3-6周)、
  生产失败率(约5-10%),以及每次输注40-50万美元的标价 —
  全球仅约150个认证中心能够实施。FDA 2024年1月对整个类别发布
  的继发性T细胞恶性肿瘤黑框警告(CAR-T治疗后发生T-NHL/T-ALL
  的病例)重新定义了风险收益评估,并触发了15年患者登记要求。
  异体("即用型")CAR-T项目(Allogene ALLO-501、Caribou
  Biosciences、Poseida)是下一个前沿,但截至2025年商业上仍未
  被证明 — 已发表数据显示持久性仍落后于自体产品。

