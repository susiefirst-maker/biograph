mesh_id: D012333    # RNA, Messenger

disease_overview: |
  mRNA therapeutics deliver synthetic messenger RNA — encoding
  antigens, enzymes, or signaling proteins — to host cells for
  transient expression, enabling vaccination, protein replacement,
  and intracellular immune modulation. The field emerged from
  Katalin Karikó and Drew Weissman's 2005 work on
  pseudouridine-modified mRNA that evades innate immune
  recognition (work that earned the 2023 Nobel Prize in Medicine
  / Physiology), combined with the lipid-nanoparticle (LNP)
  delivery chemistry developed by Alnylam / Arbutus / Acuitas
  through the 2010s. The two technologies converged in the
  COVID-19 pandemic: Pfizer / BioNTech's Comirnaty and Moderna's
  Spikevax received emergency-use authorization in December 2020
  — the fastest vaccine development in human history, from
  sequence to authorization in ~11 months.

  The 2021-2022 commercial peak reached ~$80 billion combined
  (Comirnaty ~$37B 2021, ~$56B 2022; Spikevax ~$17B 2021, ~$18B
  2022). The post-pandemic collapse was equally dramatic —
  combined 2024 revenue ~$10-15B with further contraction
  expected as COVID boosters shift to annual uptake similar to
  flu. This created the current strategic question for Moderna
  and BioNTech specifically: can mRNA be a platform franchise or
  is it a pandemic-only franchise?

  Post-COVID mRNA development tracks:
  (1) **Respiratory vaccines** — Moderna mResvia (mRNA-1345)
      approved May 2024 for RSV in adults ≥60, the first
      non-COVID mRNA approval. Flu (mRNA-1010, Pfizer qIRV),
      COVID+flu combo (mRNA-1083 Phase 3), CMV (mRNA-1647 Phase
      3, readout 2025) are the near-term pipeline.
  (2) **Individualized neoantigen oncology mRNA vaccines** —
      mRNA-4157 / autogene cevumeran (Moderna + Merck) showed
      44% reduction in recurrence / death vs pembrolizumab alone
      in KEYNOTE-942 adjuvant melanoma Phase 2b; Phase 3 started
      2023. BioNTech's autogene cevumeran with Genentech in
      pancreatic cancer + melanoma Phase 2.
  (3) **Rare disease protein replacement** — propionic acidemia
      (mRNA-3927), OTC deficiency, cystic fibrosis mRNA
      (MRT5005 / Translate Bio → Sanofi). High scientific promise
      but clinical translation slow — MRT5005 and mRNA-3704
      (MMA) were paused for efficacy or delivery-related issues.
  (4) **In-vivo cell therapy** — Capstan (Pfizer) and Orbital
      develop LNP-delivered mRNA that reprograms circulating
      T-cells into transient CARs; bridges mRNA and CAR-T
      modalities.

  IP landscape is fraught. Moderna has settled or litigated
  with Alnylam, Arbutus, Genevant, and GSK on LNP + mRNA
  chemistry patents. Manufacturing cost, cold-chain
  requirements (ultra-low-temperature for original Comirnaty),
  and extrahepatic delivery limits (LNP concentrates in liver)
  remain active engineering bottlenecks.

disease_overview_zh: |
  mRNA治疗通过递送合成信使RNA(编码抗原、酶或信号蛋白)到
  宿主细胞实现瞬时蛋白表达,可用于疫苗接种、蛋白替代治疗和
  细胞内免疫调节。该领域源于Katalin Karikó和Drew Weissman
  2005年关于假尿嘧啶修饰mRNA躲避天然免疫识别的工作(获2023
  年诺贝尔医学奖),以及2010年代由Alnylam / Arbutus / Acuitas
  开发的脂质纳米颗粒(LNP)递送化学。两项技术在COVID-19大流行
  中交汇:辉瑞/BioNTech的Comirnaty和Moderna的Spikevax于2020
  年12月获得紧急使用授权 — 这是人类历史上最快的疫苗开发,
  从序列到授权仅用约11个月。

  2021-2022年商业峰值合计约800亿美元(Comirnaty 2021年约370
  亿、2022年约560亿;Spikevax 2021年约170亿、2022年约180亿)。
  大流行后的跌幅同样剧烈 — 2024年合计收入约100-150亿美元,
  预计随着COVID加强针转变为类似流感的年度接种而进一步收缩。
  这为Moderna和BioNTech带来了核心战略问题:mRNA究竟是平台
  特许经营还是仅限大流行的特许经营?

  COVID后mRNA发展赛道:
  (1)**呼吸道疫苗** — Moderna的mResvia(mRNA-1345)2024年
  5月获批用于≥60岁成人RSV,是首个非COVID mRNA获批产品。
  流感(mRNA-1010、辉瑞qIRV)、COVID+流感联合(mRNA-1083
  III期)、CMV(mRNA-1647 III期,2025年读出)是近期管线。
  (2)**个体化新抗原肿瘤mRNA疫苗** — mRNA-4157 / autogene
  cevumeran(Moderna+默沙东)在KEYNOTE-942辅助黑色素瘤IIb期
  试验中,与pembrolizumab单药对比复发/死亡减少44%;III期
  2023年启动。BioNTech与Genentech合作的autogene cevumeran
  在胰腺癌+黑色素瘤II期。
  (3)**罕见病蛋白替代治疗** — 丙酸血症(mRNA-3927)、OTC
  缺乏症、囊性纤维化mRNA(MRT5005 / Translate Bio → Sanofi)。
  科学前景高但临床转化缓慢 — MRT5005和mRNA-3704(MMA)因
  疗效或递送相关问题暂停。
  (4)**体内细胞治疗** — Capstan(辉瑞)和Orbital开发LNP
  递送的mRNA,可在体内将循环T细胞重编程为瞬时CAR;桥接mRNA
  和CAR-T两种模式。

  知识产权格局复杂。Moderna已就LNP + mRNA化学专利与Alnylam、
  Arbutus、Genevant和GSK进行和解或诉讼。生产成本、冷链要求
  (原始Comirnaty需超低温储存)以及肝外递送限制(LNP集中于
  肝脏)仍是活跃的工程瓶颈。

