lessons:
  - title: "First-Indication-Approval Timing Beats First-Discovery Timing in Validated Mechanistic Classes"
    title_zh: "在机制已验证的类别中,首先获批的适应症时机比首先发现时机更关键"
    lesson_type: competitive_dynamics
    pattern: |
      When two or more credible sponsors pursue the same validated
      mechanism, the commercial winner is typically the first to
      secure regulatory approval in the first big indication — not
      the first to discover or file IND. Merck's MK-3475 entered
      clinical development *later* than BMS's nivolumab but narrowly
      beat Opdivo to FDA approval for melanoma (September 4 vs
      December 22, 2014) via aggressive accelerated-pathway
      execution. That 3.5-month head start compounded through the
      KEYNOTE program into a 3x revenue lead by 2023. BMS's
      comparable molecule with comparable efficacy never closed the
      gap.
    key_evidence:
      - "MK-3475 revived 2010 after BMS nivolumab Phase I readout validated the class — Merck was years behind at that point"
      - "FDA breakthrough designation for MK-3475 on 2013-04-24"
      - "Keytruda FDA approval 2014-09-04; Opdivo 2014-12-22"
      - "Keytruda 2023 revenue ~$25B vs Opdivo 2023 revenue ~$9B despite similar per-patient efficacy"
      - "Keytruda label reached 30+ indications vs Opdivo ~15 via KEYNOTE vs CheckMate program breadth"
    limitations:
      - "Applies to validated mechanistic classes; truly novel mechanisms reward first-to-discover"
      - "Requires regulatory + commercial execution; being first without label breadth delivers only a temporary lead"
      - "Subsidized by accelerated-pathway availability; in non-accelerated jurisdictions the timing edge is smaller"
    applicable_contexts:
      - "Evaluating second-entrant commercial potential in validated classes"
      - "Prioritization among close competitors racing to first-indication approval"
      - "Board-level decisions on whether to accelerate a Phase 2 despite risk"
    applicable_to_landscapes:
      - pd1-pdl1
      - pembrolizumab
      - io-oncology
    human_reviewed: true
    reviewed_by: di

  - title: "Label-Expansion as a Durable Moat in Pan-Tumor Mechanisms"
    title_zh: "标签扩展作为泛肿瘤机制药物的持久护城河"
    lesson_type: strategic_commercial
    pattern: |
      For mechanisms with broad anti-tumor rationale, aggressive
      post-approval indication-expansion programs convert a narrow
      time-to-market advantage into a durable share advantage.
      Merck's KEYNOTE program (1000+ trials across 30+ indications)
      turned Keytruda's 3.5-month first-mover lead over Opdivo into
      a 3x revenue lead by 2023. BMS's narrower CheckMate program
      and label-development strategy — despite near-identical
      underlying efficacy — left share on the table. Roche's
      IMpower and AZ's PACIFIC programs show the middle-path: broad
      but not Keytruda-broad.
    key_evidence:
      - "KEYNOTE-024 established first-line NSCLC PD-L1 ≥50% in 2016 — Merck then extended to KEYNOTE-189 (all-comer NSCLC with chemo), KEYNOTE-048 (H&N), KEYNOTE-426 (RCC+axitinib), KEYNOTE-522 (early TNBC), KEYNOTE-716 (adjuvant melanoma)"
      - "Keytruda approved in 30+ indications by 2024 vs Opdivo ~15"
      - "Revenue ratio (Keytruda ~$25B vs Opdivo ~$9B in 2023) despite comparable potency and similar pricing"
    limitations:
      - "Only works for pan-tumor mechanisms; narrow mechanisms can't expand label by definition"
      - "Trial costs scale linearly with indications — requires deep pockets and long horizons"
      - "Fast-follow competitors on the best indications erode share even in broad classes"
    applicable_contexts:
      - "Checkpoint inhibitor launch and lifecycle planning"
      - "Any mechanism with broad tumor-microenvironment or immune-system rationale"
      - "Commercial vs clinical tradeoff decisions on follow-on trials"
    applicable_to_landscapes:
      - pd1-pdl1
      - pembrolizumab
      - io-oncology
    human_reviewed: true
    reviewed_by: di

  - title: "China-Originator Biologic Discount Pricing Pressures Net Prices Before Patents Expire"
    title_zh: "中国原研生物药折扣定价在专利到期前已压低净价"
    lesson_type: market_access_pricing
    pattern: |
      When Chinese-originator molecules in a validated class reach
      FDA approval at 40-70% list-price discount to the Western
      incumbent, they create downward pressure on NET realized
      pricing (via payer negotiation leverage) even while list
      prices stay nominal. Tislelizumab (BeiGene, 2024) and
      toripalimab (Junshi/Coherus, 2023) US launches priced well
      below Keytruda. Payers + PBMs use the low-cost comparators
      to extract larger rebates from incumbents. Net effect: the
      incumbent's effective pricing power declines years before the
      composition-patent cliff.
