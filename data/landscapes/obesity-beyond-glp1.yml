    - ACE-031 myostatin (Acceleron historical, 2013) — epistaxis telangiectasia-mimicking AEs halted
    - danuglipron (Pfizer, 2023) — oral GLP-1, transaminase elevations discontinued Phase 3

failed_trials:
  - "RIO series (rimonabant CB1R, 2006-2008) — psychiatric adverse events including suicidal ideation; withdrawn worldwide; defined peripheral-restricted design requirement for follow-ons"
  - "ACE-031 / ACE-536 myostatin (Acceleron 2013) — epistaxis + telangiectasia-mimicking vascular AEs halted development; lesson informing bimagrumab safety design"
  - "CHIASMA-Gemini (setmelanotide in broader obesity, 2022) — failed primary endpoint in general obesity; MC4R agonism doesn't work outside genetic subpopulations"
  - "Danuglipron Phase 3 (Pfizer, 2023) — transaminase elevations at therapeutic dose terminated oral GLP-1 program"

