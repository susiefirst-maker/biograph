scientific_bottlenecks:
  - "Vein-to-vein time — 3-6 weeks from apheresis to infusion; during this window patients may progress past eligibility"
  - "Manufacturing failure rate ~5-10% — apheresis product fails expansion / viability QC; patient waits out another cycle"
  - "Secondary T-cell malignancies — FDA January 2024 class-wide boxed warning; mechanism not fully understood (integration-site vs lineage-shift vs pre-existing clone)"
  - "Cytokine release syndrome (CRS) + ICANS neurotoxicity — grade ≥3 CRS 10-40% depending on construct; ICANS 3-25%; tocilizumab and steroid rescue mandatory"
  - "Cost + access — $400-500k per infusion; ~150 certified centers globally; capacity bottleneck limits TAM independent of demand"
  - "Solid-tumor hostility — tumor microenvironment (Tregs, MDSCs, checkpoint upregulation) suppresses adoptive T-cells; no approvals in solid tumors after 10+ years of programs"
  - "Allogeneic durability — 3-6 month response durability in current allo programs vs ~2+ year durability in autologous; host-vs-graft + persistence gaps unsolved"

market_dynamics: |
  Global CAR-T market reached ~$4 billion in 2023 with Carvykti
  driving 2024 growth toward ~$1 billion single-product trajectory.
  Yescarta + Tecartus combined $2.1 billion 2023 (Gilead); Kymriah
  $508 million; Breyanzi $300M; Abecma $406 million. The commercial
  profile is unique: high list price ($400-500k), limited certified-
  site capacity, vein-to-vein bottleneck, and insurance-coverage
  frictions all cap revenue below what clinical demand would
  support. M&A: Kite-Gilead 2017 ($11.9B), Celgene-Juno 2018 ($9B),
  Bristol-Celgene 2019 ($74B) — all priced CAR-T platforms well.
  Post-2023 Chinese CAR-T pricing at $50-200k / infusion in domestic
  market is establishing a cost precedent that Western payers
  eventually leverage. 2024 FDA secondary-T-cell-malignancy boxed
  warning did not materially reduce uptake but added risk-management
  overhead to every infusion.

regulatory_context: |
  FDA's Center for Biologics Evaluation and Research regulates CAR-T
  as biologics with combined cellular therapy + gene therapy
  considerations. Each autologous product requires REMS (Risk
  Evaluation and Mitigation Strategy) program with certified
  treatment centers only. January 2024 class-wide boxed warning for
  secondary T-cell malignancies (22 reported cases as of Q4 2023)
  requires 15-year patient registries and revised patient consent.
  The FDA has been flexible on single-arm accelerated approvals
  (ZUMA-1, KarMMa, CARTITUDE-1) but increasingly requires Phase 3
  confirmatory data (ZUMA-7, CARTITUDE-4) before first-line moves.
  Chinese NMPA approves CAR-T under parallel framework — equecabtagene
  + relmacabtagene + zevorcabtagene all approved 2021-2024 domestically.
  Allogeneic CAR-T faces additional gene-editing disclosure under
  FDA 2022 guidance.

