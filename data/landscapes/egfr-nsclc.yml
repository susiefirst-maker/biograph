# EGFR NSCLC — curated T1 landscape.
#
# §7.4.6 priority #6. Seventh curated landscape. Target-indication
# pair (EGFR-mutant non-small-cell lung cancer). Dense generational
# story — four TKI generations over 20 years, each addressing the
# prior's resistance pattern. Pairs naturally with HER2 (both RTKs,
# similar clinical-development arcs).

