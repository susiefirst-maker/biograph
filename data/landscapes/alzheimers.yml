lessons:
  - title: "Approval Over Advisory-Committee Objection Triggers Structural Commercial Failure"
    title_zh: "在顾问委员会反对下获批会引发结构性商业失败"
    lesson_type: regulatory_pathway
    pattern: |
      When FDA approves a drug over explicit advisory-committee
      objection (Aduhelm 2021 — committee voted 10-0 against),
      the downstream consequences cascade beyond the FDA decision
      itself: CMS will typically restrict reimbursement;
      physicians recognize the regulatory-science dissonance and
      refuse to prescribe; payers impose heavy prior-auth;
      commercial revenue fails to materialize even with label
      approval. Biogen Aduhelm 2021 → CMS trial-only coverage 2022
      → ~$3M total sales through 2023 → January 2024 withdrawal is
      the canonical template. Sponsors pushing for over-committee
      approvals should anticipate that regulatory win doesn't
      translate to commercial win — the medical community's
      independent judgment gates adoption. The same pattern
      appears in Sarepta Elevidys 2024 expansion despite EMBARK
      miss (P7-D17 lesson cross-reference).
    key_evidence:
      - "FDA advisory committee voted 10-0 against Aduhelm approval November 2020; FDA approved June 2021 citing amyloid-reduction surrogate"
      - "CMS NCD April 2022 — restricted Aduhelm coverage to clinical-trial participants only (later expanded to CMS registry participants)"
      - "Aduhelm US revenue 2021-2023 cumulative ~$3M vs Biogen internal projection $1B+ annual peak"
      - "Biogen announced January 2024 withdrawal; $500M in cumulative write-offs"
      - "Parallel precedent: Elevidys 2024 FDA expansion despite EMBARK Phase 3 miss — early Medicaid + some commercial payer restrictions emerging"
    limitations:
      - "Works primarily in US — EU + Japan NICE-equivalent systems have different dynamics"
      - "Life-threatening orphan indications with no alternatives may survive over-committee approval (rare)"
      - "Commercial outcome cascade takes 18-36 months — approval → CMS decision → physician response → market withdrawal"
    applicable_contexts:
      - "Accelerated-approval strategy planning pre-advisory-committee"
      - "M&A valuation of assets with pending advisory-committee votes"
      - "CMS + payer engagement timing decisions"
    applicable_to_landscapes:
      - alzheimers
      - crispr-gene-therapy
    human_reviewed: true
    reviewed_by: di

  - title: "Classes with Modest Efficacy + High Monitoring Burden Face Scalability Ceilings Independent of Payer Coverage"
    title_zh: "疗效有限但监测负担重的药物类别面临独立于付款人覆盖的可扩展性天花板"
    lesson_type: clinical_development
    pattern: |
      When a therapy produces modest clinical benefit (~25-35%
      slowing of decline) but requires infusion administration +
      quarterly MRI monitoring + specialized diagnostic
      infrastructure (amyloid PET + CSF biomarkers), the class's
      practical reach is constrained far below the label-eligible
      population — regardless of payer coverage or pricing.
      Leqembi has CMS coverage + $26,500/year list price, but
      2024 infusion count is ~10,000-15,000 patients out of
      ~4-5M US symptomatic amyloid-positive early-stage
      population. The bottleneck is physical infrastructure:
      amyloid PET scan availability (~$5k/scan, limited centers),
      MRI monitoring slots, biweekly infusion-center capacity.
      Sponsors planning next-generation anti-amyloid programs
      (remternetug SC, Leqembi SC) are investing in
      administration-convenience precisely because the monitoring
      infrastructure won't materially expand for years. Similar
      pattern in CAR-T (P7-D9), gene therapy (P7-D17),
      individualized oncology mRNA (P7-D16).
    key_evidence:
      - "Leqembi 2024 Q3 infusion count ~12,000 patients vs US label-eligible ~4-5M"
      - "Biweekly IV infusion + quarterly MRI monitoring + required amyloid-PET or CSF at enrollment = ~8 healthcare interactions/year"
      - "US amyloid PET capacity 2024: ~200 active sites; Medicare coverage limited pre-2023"
      - "Lilly Kisunla 2024 differentiation via time-limited regimen (stop when plaques clear, ~40% at 12 months)"
      - "Parallel: Casgevy <20 infusions globally Q4 2024 despite ~20,000 eligible"
    limitations:
      - "Administration-convenience improvements (SC formulations 2025-2026) will incrementally expand reach"
      - "Diagnostic infrastructure (blood-based p-tau217 biomarkers) may scale faster than infusion capacity"
      - "Patient / family willingness to tolerate monitoring burden for modest benefit is a soft variable"
    applicable_contexts:
      - "Modest-efficacy high-monitoring therapeutic class planning"
      - "Infrastructure-capacity modeling in biologic-intensive areas"
      - "Oral / SC conversion program prioritization"
    applicable_to_landscapes:
      - alzheimers
      - car-t
      - crispr-gene-therapy
      - mrna-therapeutics
    human_reviewed: true
    reviewed_by: di

  - title: "Three-Decade Hypothesis Validation Requires Biomarker-Confirmed Patient Selection"
    title_zh: "三十年机制假说的验证需要生物标志物确认的患者选择"
    lesson_type: scientific_mechanistic
    pattern: |
      When a therapeutic hypothesis has failed repeatedly (~100
      amyloid-targeting Phase 3 trials failed 1998-2019 in
      Alzheimer's), validation frequently requires correcting
      patient-selection errors rather than the mechanism itself.
      The 2020s anti-amyloid success (Leqembi 2023, Kisunla 2024)
      came from three corrections: (1) biomarker-confirmed amyloid
      positivity pre-enrollment (~40% of clinically-diagnosed AD
      is not amyloid-positive); (2) early-symptomatic stage
      (MCI + mild dementia, not moderate-severe); (3) targeting
      aggregated/plaque form of amyloid rather than monomer.
      Sponsors facing mature therapeutic areas with dense failure
      history should invest in biomarker + patient-selection
      diagnostic infrastructure before running Phase 3 — the
      hypothesis may be correct and the patient selection wrong.
      Parallel pattern in HER2 (1998 companion diagnostic), PD-L1
      (CPS/TPS scoring), KRAS G12C (mutation confirmation).
    key_evidence:
      - "~100 amyloid Phase 3 failures 1998-2019: bapineuzumab, solanezumab, gantenerumab, crenezumab, aducanumab EMERGE/ENGAGE inconsistency"
      - "CLARITY-AD 2022: biomarker-confirmed amyloid+ + early-symptomatic + plaque-binding → 27% CDR-SB slowing HR"
      - "TRAILBLAZER-ALZ 2 2023: low/medium-tau subgroup analysis emphasized 35% slowing"
      - "Companion diagnostic: amyloid PET + CSF A-β42/40 + p-tau217 blood test infrastructure required"
      - "Contrast: BACE inhibitors (verubecestat, atabecestat, umibecestat) failed 2017-2019 despite correct biomarker selection — mechanism was wrong (cognitive worsening from BACE1 substrate accumulation)"
    limitations:
      - "Diagnostic-infrastructure investment is capex-intensive — only tractable for large sponsors or consortiums"
      - "Patient-selection correction doesn't rescue wrong-mechanism hypotheses (BACE failures despite biomarker selection)"
      - "Companion diagnostic approval is a 3-5 year regulatory + commercial effort parallel to drug development"
    applicable_contexts:
      - "Alzheimer's / Parkinson's / ALS / neurodegenerative programs"
      - "Mature therapeutic areas with dense failure history"
      - "Companion diagnostic investment decisions"
    applicable_to_landscapes:
      - alzheimers
      - her2
      - pd1-pdl1
      - kras
    human_reviewed: true
    reviewed_by: di
