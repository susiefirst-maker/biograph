# PD-1 / PD-L1 (Immuno-oncology) — curated T1 landscape.
#
# §7.4.6 priority #3. Third curated landscape. Reuses the Keytruda
# golden-entity narrative (P2-D5) as an anchor and expands to the
# full class across 12+ drugs, 8+ companies, and the KEYNOTE /
# CheckMate / IMpower trial programs.
