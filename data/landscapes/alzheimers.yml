pipeline:
  approved:
    - lecanemab (Leqembi, Eisai / Biogen)
    - donanemab (Kisunla, Lilly)
    - donepezil (Aricept, Eisai)
    - galantamine (Razadyne, Janssen)
    - rivastigmine (Exelon, Novartis)
    - memantine (Namenda, AbbVie)
  phase_3:
    - remternetug (Lilly second-gen SC anti-amyloid)
    - semaglutide EVOKE + EVOKE+ (Novo Nordisk GLP-1 AD)
    - Leqembi subcutaneous formulation (Eisai)
  phase_2:
    - E2814 tau (Eisai)
    - BIIB080 MAPT ASO (Biogen / Ionis)
    - JNJ-63733657 tau (Janssen)
    - AL002 TREM2 (Alector / AbbVie)
    - ACU193 oligomer-selective (Acumen)
    - fosgonimeton (Athira)
    - buntanetap (Annovis)
  phase_1:
    - multiple TREM2 + microglial programs
    - α-synuclein vaccines (cross-indication Parkinson's / AD)
  failed:
    - gantenerumab (Roche GRADUATE-1/2, 2022) — anti-amyloid missed primary
    - solanezumab (Lilly A4 prevention + DIAN-TU, 2023) — monomer-targeting amyloid failed in preclinical AD + familial AD
    - aducanumab (Biogen, 2021-2024) — approved but commercially withdrawn January 2024
    - multiple BACE inhibitors (verubecestat Merck, atabecestat Janssen, umibecestat Novartis) — discontinued 2017-2019 for cognitive worsening
    - liraglutide ELAD GLP-1 AD (2020) — modest signal, halted, succeeded by semaglutide EVOKE

failed_trials:
  - "EMERGE / ENGAGE (aducanumab, 2019-2020) — conflicting Phase 3 outcomes; FDA approved 2021 on surrogate amyloid reduction over advisory committee objection; withdrawn 2024"
  - "GRADUATE-1 / GRADUATE-2 (gantenerumab, Roche, 2022) — missed CDR-SB primary; Roche exited anti-amyloid class"
  - "A4 + DIAN-TU (solanezumab, Lilly, 2023) — primary prevention + familial AD; failed; established that monomer-targeting amyloid antibodies don't work preventively"
  - "EPOCH / APECS (verubecestat BACE1, Merck, 2017-2018) — cognitive worsening in Phase 3; halted; catalyzed industry retreat from BACE inhibition"
  - "ELAD (liraglutide GLP-1 AD, 2020) — modest signal insufficient for Phase 3; Novo shifted to semaglutide EVOKE"

