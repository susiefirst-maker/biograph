lessons:
  - title: "Class-Wide Boxed Warnings Structurally Reposition 1L → 2L Without Withdrawing the Drug"
    title_zh: "类别范围黑框警告会把一线药物结构性转为二线而不下市"
    lesson_type: regulatory_pathway
    pattern: |
      When FDA imposes a class-wide boxed warning based on a single
      well-designed post-marketing safety trial, the warning
      typically does not force withdrawal but permanently moves
      the class from first-line to second-line positioning in
      autoimmune / inflammatory indications where alternative
      mechanisms exist. The 2021 ORAL Surveillance → September
      2021 JAK boxed warning is the canonical recent case:
      tofacitinib, baricitinib, and upadacitinib remained on
      market but RA prescribing shifted to TNF / IL-23 / IL-17
      first. This contrasts sharply with the CAR-T 2024 class
      boxed warning (secondary T-cell malignancies) which did
      NOT reduce uptake because CAR-T patients have terminal
      disease and no comparable alternatives. The differential
      predicts whether a class can absorb a warning: alternative
      availability × disease severity → uptake impact.
    key_evidence:
      - "ORAL Surveillance 2021: tofacitinib MACE HR 1.33, malignancy HR 1.48 vs TNF in RA ≥50 with CV risk"
      - "JAK class RA new-prescription share dropped ~30% in 2022 post-warning"
      - "Xeljanz revenue 2023 $1.7B vs $2.7B 2020 peak — ~40% decline"
      - "Contrast: Carvykti 2024 grew ~80% YoY despite January 2024 class-wide boxed warning"
      - "AbbVie's Rinvoq defended share via label-expansion into indications where biologic alternatives are weaker (alopecia areata, AD severity, UC post-TNF-fail)"
    limitations:
      - "Applies to classes with mature biologic alternatives — novel mechanisms without alternatives get different treatment"
      - "Physician / payer response varies by indication — derm + IBD less affected than rheumatology"
      - "Warnings can be class-wide AND mechanism-permissive (TYK2 allosteric escaped)"
    applicable_contexts:
      - "JAK / TYK2 program strategy and positioning"
      - "Any class with post-marketing safety trial planning"
      - "Payer-scenario modeling for boxed-warning events"
    applicable_to_landscapes:
      - jak-inhibitors
      - car-t
    human_reviewed: true
    reviewed_by: di

  - title: "Mechanistic Class-Escape Drugs Can Sidestep Class Warnings — But Commercial Traction Lags Marketing Story"
    title_zh: "机制层面的类别突围药物可以绕开类别警告 — 但商业起量滞后于营销故事"
    lesson_type: scientific_mechanistic
    pattern: |
      When a class-wide boxed warning is based on a specific
      binding mode or pharmacologic mechanism (competitive ATP-site
      JAK inhibition), a sufficiently differentiated drug using a
      distinct mechanism (allosteric TYK2 JH2-domain binding in
      BMS's deucravacitinib) can legitimately escape the warning
      category. But commercial traction for class-escape drugs
      tends to lag the marketing story by 2-3 years — prescribers
      take time to internalize the mechanistic distinction,
      payers default to class-wide utilization management, and
      physician conservatism favors established-pathway biologics.
      Deucravacitinib's 2022-2024 ramp was slower than AbbVie
      Skyrizi (IL-23) despite comparable efficacy. Class-escape
      bets require 5+ year commercial-patience horizons.
    key_evidence:
      - "Deucravacitinib (Sotyktu) 2022 approval without boxed warning; 2023 revenue $252M vs BMS internal projection $500M+"
      - "Skyrizi (IL-23, AbbVie) 2023 revenue $7.8B — comparable psoriasis efficacy to deucravacitinib but longer market presence"
      - "Ritlecitinib 2023 approval in AA without boxed warning (JAK3 / TEC selective); narrow indication limits revenue impact"
      - "Mechanistic escape not always commercial escape — TYK2 allosteric is clean safety profile but 2L positioning sticks from class habit"
    limitations:
      - "Requires genuine mechanistic difference — marketing-only distinction doesn't work with payers"
      - "Class-escape commercial trajectory depends on rest of indication pipeline (derm vs rheum vs IBD)"
      - "Follow-on TYK2 molecules (TAK-279, VTX958) may commoditize the subclass before original pioneer captures peak"
    applicable_contexts:
      - "TYK2 selective program development strategy"
      - "Any scenario where post-warning-era follow-on is considered"
      - "Long-horizon commercial modeling for class-escape assets"
    applicable_to_landscapes:
      - jak-inhibitors
    human_reviewed: true
    reviewed_by: di

  - title: "Label-Expansion as Post-Patent-Cliff Lifecycle Insurance for Oral Small-Molecule Franchises"
    title_zh: "标签扩展作为口服小分子专利悬崖后的生命周期保险"
    lesson_type: strategic_commercial
    pattern: |
      When a pharma company is facing a large-biologic patent
      cliff (Humira 2023 for AbbVie), investing early in oral
      small-molecule follow-on franchise with broad
      label-expansion opportunities provides revenue insurance
      that biosimilars cannot replicate. AbbVie's Rinvoq
      (upadacitinib, approved 2019 — four years before Humira US
      cliff) reached 6+ indications (RA, PsA, AS, AD, UC, Crohn's,
      axial spondyloarthritis) by 2023 and $5.9B revenue — single-
      handedly offsetting ~30% of Humira decline. The template:
      acquire / develop small-molecule in the same therapeutic
      area as biologic cliff, aggressively pursue every indication
      the mechanism supports, accept worse safety profile than
      the biologic in exchange for oral convenience + lower cost.
      Rinvoq's 2021 boxed warning reduced trajectory but not the
      strategic win.
    key_evidence:
      - "Humira 2022 peak $21B → 2023 $14B → 2024 ~$9B (biosimilar erosion 2023+)"
      - "Rinvoq 2020 $731M → 2023 $5.9B — 8x growth over 4 years via 6-indication label"
      - "Skyrizi (IL-23) + Rinvoq combined 2024 ~$17B — AbbVie's post-Humira dual-franchise play"
      - "Contrast: Pfizer Xeljanz did not benefit from similar label-expansion playbook — Xeljanz stayed narrower (RA + PsA + UC) and 2021 boxed warning was its indication"
    limitations:
      - "Requires small-molecule with broad mechanism applicability — selective molecules have fewer label expansion targets"
      - "Post-2021 class boxed warning narrowed the playbook — not all classes can absorb a warning and keep expanding"
      - "Timing matters — Rinvoq developed 2011-2019 (pre-warning); new programs face tighter safety bar"
    applicable_contexts:
      - "Patent-cliff defense planning for biologic franchises"
      - "Oral-small-molecule vs biologic strategic positioning"
      - "Label-expansion ROI modeling"
    applicable_to_landscapes:
      - jak-inhibitors
      - biosimilar-dynamics
    human_reviewed: true
    reviewed_by: di
