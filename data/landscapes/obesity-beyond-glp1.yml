mesh_id: D009765    # Obesity

disease_overview: |
  GLP-1 receptor agonists defined obesity therapeutics in the
  2020-2024 window, but the class has inherent ceilings: mean
  weight reduction plateaus at 15-22% (Wegovy → Zepbound), GI
  tolerability limits dose escalation, weight regain is rapid
  post-discontinuation, and ~30-40% of weight loss on GLP-1
  monotherapy is lean-mass (skeletal muscle, organ mass). These
  constraints define the "beyond GLP-1" investment landscape —
  mechanisms designed either (a) to layer additional weight loss
  on top of GLP-1 via combination, (b) to preserve muscle mass
  during weight loss, (c) to provide oral-small-molecule
  alternatives for convenience + cost, or (d) to target genetic
  or rare obesity subsets that GLP-1 monotherapy misses.

  Seven major mechanism tracks:
  (1) **Amylin analog combinations** — cagrilintide (Novo Nordisk)
      + semaglutide = CagriSema; STEP 8 showed additive weight
      loss ~25% at week 68.
  (2) **Myostatin / Activin receptor IIA-B inhibition** —
      bimagrumab (Versanis, acquired by Lilly 2023 for $1.925B)
      is the lead; preserves skeletal muscle during weight loss.
      Regeneron has a myostatin antibody in Phase 2.
  (3) **MC4R agonists** — setmelanotide (Imcivree, Rhythm 2020)
      for POMC, PCSK1, LEPR, BBS genetic obesity; narrow population
      (~5,000 US patients) but high unit price.
  (4) **CB1R inverse agonists / antagonists** — monlunabant (Novo,
      via Inversago acquisition 2023), nimacimab (Skye Bio);
      rimonabant 2008 precedent failed on CNS psychiatric effects,
      peripheral-restricted next-generation designed to avoid.
  (5) **Triple hormone agonists (GLP-1 / GIP / glucagon)** —
      retatrutide (Lilly, Phase 3, TRIUMPH) showed 24% mean weight
      loss at 48 weeks — potential new best-in-class.
  (6) **Amycretin** (Novo Nordisk, Phase 2) — dual GLP-1 / amylin
      agonist in a single molecule; VIBRANT Phase 2 showed 22%
      weight loss at week 36 (oral formulation).
  (7) **Oral small-molecule GLP-1 alternatives** — Structure
      Therapeutics GSBR-1290, Terns Pharmaceuticals TERN-601,
      Pfizer after danuglipron failure reconstituting programs.

  The strategic shift: obesity as a chronic, indefinite-duration
  therapy requires combinations — just as HIV moved from AZT
  monotherapy to HAART cocktails. Sponsors who plan for
  combination regimens from Phase 2 onward (Novo CagriSema,
  Novo amycretin, Lilly retatrutide + tirzepatide future combos,
  Lilly + Versanis bimagrumab) are building the post-GLP-1-era
  franchise structure.

disease_overview_zh: |
  GLP-1受体激动剂定义了2020-2024年的肥胖治疗格局,但该类别有
  其固有的天花板:平均减重率在15-22%(Wegovy→Zepbound)达到
  平台,胃肠道耐受性限制了剂量递增,停药后体重反弹迅速,
  GLP-1单药减重中约30-40%为瘦体重损失(骨骼肌和脏器)。这些
  局限性定义了"GLP-1之外"的投资赛道 — 通过各种机制设计:
  (a)在GLP-1基础上叠加更多减重;(b)在减重过程中保留肌肉
  质量;(c)提供口服小分子替代以增加便利性和降低成本;或
  (d)针对GLP-1单药无法覆盖的遗传性或罕见肥胖亚组。

  七条主要机制赛道:
  (1)**胰淀素类似物联合用药** — 卡格列肽(Cagrilintide,
  诺和诺德)与司美格鲁肽组合为CagriSema;STEP 8研究显示第68
  周累加减重约25%。
  (2)**肌肉生长抑制素 / 激活素受体IIA-B抑制** — bimagrumab
  (Versanis,2023年被礼来以19.25亿美元收购)为领先分子;在
  减重过程中保留骨骼肌。Regeneron拥有II期肌肉生长抑制素
  抗体。
  (3)**MC4R激动剂** — 司美曲肽(Imcivree,Rhythm 2020)
  用于POMC、PCSK1、LEPR、BBS基因缺陷型肥胖;目标人群较窄
  (美国约5000人)但单价极高。
  (4)**CB1R反向激动剂 / 拮抗剂** — monlunabant(诺和诺德,
  通过2023年Inversago收购获得)、nimacimab(Skye Bio);
  2008年rimonabant因中枢精神副作用失败,下一代外周限制性
  设计旨在规避此问题。
  (5)**三重激素激动剂(GLP-1 / GIP / 胰高血糖素)** —
  Retatrutide(礼来,III期,TRIUMPH)在48周显示平均减重24% —
  有望成为新一代同类最佳。
  (6)**Amycretin**(诺和诺德,II期) — 单分子GLP-1 / 胰淀素
  双激动剂;VIBRANT II期显示口服制剂第36周减重22%。
  (7)**口服小分子GLP-1替代品** — Structure Therapeutics的
  GSBR-1290、Terns Pharmaceuticals的TERN-601、辉瑞在danuglipron
  失败后重组的项目。

  战略转变:肥胖作为需要长期治疗的慢性疾病需要联合用药 — 正
  如HIV从AZT单药治疗转向HAART鸡尾酒疗法。从II期开始就规划
  联合方案的厂商(诺和诺德CagriSema、诺和诺德amycretin、礼来
  retatrutide + 未来tirzepatide联合、礼来+Versanis bimagrumab)
  正在构建后-GLP-1时代的特许经营结构。

