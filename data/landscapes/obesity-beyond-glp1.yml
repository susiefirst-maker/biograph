# Obesity beyond GLP-1 — curated T1 landscape.
#
# §7.4.6 priority #15. Eleventh curated landscape. Explicit
# complement to the P7-D1 GLP-1/Obesity landscape — this one
# covers non-GLP-1 obesity mechanisms (amylin, MC4R, myostatin,
# CB1R, triple-agonists where glucagon/GIP dominate vs GLP-1,
# ghrelin, PYY, FGF21). Connects back to the metabolic cluster
# via cagrilintide, retatrutide, survodutide, and pemvidutide.

