      жҠ—дҪ“дҫқиө–зҡ„з»ҶиғһжҜ’дҪңз”Ё(ADCC)е’ҢиЎҘдҪ“дҫқиө–зҡ„з»ҶиғһжҜ’дҪңз”Ё(CDC),
      дҪҶе…¶дё»иҰҒдёҙеәҠдҪңз”ЁжҳҜз»Ҷиғһеӣ еӯҗдёӯе’ҢгҖӮ

