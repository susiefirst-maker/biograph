pipeline:
  approved:
    - exa-cel / Casgevy (Vertex / CRISPR Therapeutics)
    - lovo-cel / Lyfgenia (bluebird)
    - Zynteglo + Skysona (bluebird)
    - Luxturna (Spark / Roche)
    - Zolgensma (Novartis)
    - Hemgenix (CSL / uniQure)
    - Roctavian (BioMarin)
    - Elevidys (Sarepta)
    - Beqvez (Pfizer)
    - Kebilidi (PTC)
    - Adstiladrin (Ferring)
    - Vyjuvek (Krystal Biotech)
  phase_3:
    - NTLA-2001 TTR (Intellia / Regeneron)
    - NTLA-2002 HAE (Intellia)
    - Elevidys confirmatory DMD (Sarepta)
    - additional Zolgensma IT-administered SMA programs
  phase_2:
    - EDIT-301 sickle cell (Editas)
    - CB-010 CAR-T (Caribou)
    - ALLO-501A (Allogene)
    - P-BCMA-ALLO1 (Poseida)
  phase_1:
    - VERVE-102 LDLR base editing (Verve)
    - BEAM-301 GSD1a base editing (Beam)
    - PM359 CGD prime editing (Prime Medicine)
    - multiple early in-vivo AAV programs (Regenxbio, others)
  failed:
    - Elevidys TRIDENT / EMBARK Phase 3 primary endpoint miss 2023 — FDA still expanded approval 2024; controversial
    - VERVE-101 Phase 1 thrombocytopenia signal 2023 → pivoted to VERVE-102 (LDLR) 2024
    - gene-therapy deaths 2020-2022 (Zolgensma high-dose toxicity, multiple AAV hepatotoxicity events)
    - high-dose Duchenne gene therapy programs paused for safety across Solid Biosciences, Pfizer mini-dystrophin

failed_trials:
  - "EMBARK (Elevidys confirmatory DMD Phase 3, 2023) — missed primary endpoint NSAA change; FDA expanded approval regardless in June 2024 → controversial precedent"
  - "VERVE-101 (Phase 1 base-editing PCSK9, 2023) — Grade 4 thrombocytopenia + ALT elevation in single patient; program paused, company pivoted to VERVE-102 (LDLR)"
  - "Zolgensma high-dose intrathecal (AVXS-101 IT, 2021) — patient deaths in non-clinical studies caused pause; reworked dosing still Phase 3"
  - "Pfizer mini-dystrophin DMD (fordadistrogene, 2024) — discontinued after Phase 3 CIFFREO safety + efficacy review"

