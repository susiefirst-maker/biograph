# CAR-T / Cell Therapy — curated T1 landscape.
#
# §7.4.6 priority #5. Sixth curated landscape. Modality class
# standalone from the antibody / small-molecule ecosystem — different
# supply-chain, different economics, different regulatory framework.
# Seven approved autologous products as of 2025; allogeneic still
# unproven at commercial scale.

